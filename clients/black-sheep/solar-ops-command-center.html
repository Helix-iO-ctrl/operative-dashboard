<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Sheep Solar — Field Command Center</title>
<style>
  body { margin: 0; background: #0f1117; color: #e8eaf0; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .loader { text-align: center; }
  .spinner { width: 40px; height: 40px; border: 3px solid #232733; border-top: 3px solid #f97316; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loader" id="loading">
  <div class="spinner"></div>
  <p>Loading Command Center...</p>
</div>
<script>
fetch('https://gzpuectetjatqbpcdgqt.supabase.co/storage/v1/object/public/project-files/black-sheep/solar-ops-command-center.html')
  .then(r => r.text())
  .then(html => { document.open(); document.write(html); document.close(); })
  .catch(e => { document.getElementById('loading').innerHTML = '<p>Error loading dashboard: ' + e.message + '</p>'; });
</script>
</body>
</html>
