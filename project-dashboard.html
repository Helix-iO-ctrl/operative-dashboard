                }, archiving === (proj.id || m.project_slug) ? "\u23F3" : (isArchived ? "\u21A9" : "\uD83D\uDDC4\uFE0F"))
              );
            }

            return h("div", { style: { display:"flex", flexDirection:"column", gap:12 } },
              activeProjects.map(function(m) { return renderProjectCard(m, false); }),

              // Archived section
              archivedProjects.length > 0 && h("div", { style: { marginTop:8 } },
                h("button", {
                  onClick: function() { setShowArchived(!showArchived); },
                  style: { width:"100%", padding:"8px 16px", background:"none",
                    border:"1px dashed rgba(255,255,255,0.1)", borderRadius:8, color:"#64748B",
                    fontSize:12, cursor:"pointer", fontFamily:"inherit" }
                }, showArchived
                  ? "\u25B4 Hide " + archivedProjects.length + " archived project" + (archivedProjects.length > 1 ? "s" : "")
                  : "\u25BE " + archivedProjects.length + " archived project" + (archivedProjects.length > 1 ? "s" : "")
                ),
                showArchived && h("div", { style: { display:"flex", flexDirection:"column", gap:8, marginTop:8 } },
                  archivedProjects.map(function(m) { return renderProjectCard(m, true); })
                )
              )
            );
          })(),

          // ── Admin Tools: Merge Projects ──
          h("div", { style: { marginTop:24, borderTop:"1px solid rgba(255,255,255,0.08)", paddingTop:20 } },
            !showMerge
              ? h("button", {
                  onClick: function() { setShowMerge(true); loadAllProjects(); },
                  style: { width:"100%", padding:"10px 16px", background:"rgba(255,255,255,0.04)",
                    border:"1px solid rgba(255,255,255,0.08)", borderRadius:8, color:"#94A3B8",
                    fontSize:13, cursor:"pointer", fontFamily:"inherit", display:"flex",
                    alignItems:"center", justifyContent:"center", gap:8 }
                }, "\uD83D\uDD00 Merge Projects")
              : h("div", { style: { background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)",
                  borderRadius:12, padding:20 } },
                  h("div", { style: { display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 } },
                    h("div", { style: { color:"#FBF7F2", fontSize:14, fontWeight:600 } }, "\uD83D\uDD00 Merge Projects"),
                    h("button", { onClick: function() { setShowMerge(false); setMergeResult(null); setMergeSource(''); setMergeTarget(''); },
                      style: { background:"none", border:"none", color:"#64748B", cursor:"pointer", fontSize:16 } }, "\u2715")
                  ),
                  h("div", { style: { color:"#64748B", fontSize:12, marginBottom:16, lineHeight:1.5 } },
                    "Move data from one project into another. The source project will be marked as merged and hidden."),

                  // Source dropdown
                  h("label", { style: { color:"#94A3B8", fontSize:11, fontWeight:600, display:"block", marginBottom:4 } }, "MERGE FROM (source)"),
                  h("select", {
                    value: mergeSource,
                    onChange: function(e) { setMergeSource(e.target.value); },
                    style: { width:"100%", padding:"8px 12px", background:"#1C1C2A", color:"#FBF7F2",
                      border:"1px solid rgba(255,255,255,0.12)", borderRadius:8, fontSize:13,
                      marginBottom:12, fontFamily:"inherit" }
                  },
                    h("option", { value:"" }, "Select source project..."),
                    allProjects.filter(function(p) { return p.status !== 'merged'; }).map(function(p) {
                      return h("option", { key: p.id, value: p.id },
                        p.name + " (" + p.slug + ") \u2014 " + p.status);
                    })
                  ),

                  // Target dropdown
                  h("label", { style: { color:"#94A3B8", fontSize:11, fontWeight:600, display:"block", marginBottom:4 } }, "MERGE INTO (target \u2014 keeps this one)"),
                  h("select", {
                    value: mergeTarget,
                    onChange: function(e) { setMergeTarget(e.target.value); },
                    style: { width:"100%", padding:"8px 12px", background:"#1C1C2A", color:"#FBF7F2",
                      border:"1px solid rgba(255,255,255,0.12)", borderRadius:8, fontSize:13,
                      marginBottom:16, fontFamily:"inherit" }
                  },
                    h("option", { value:"" }, "Select target project..."),
                    allProjects.filter(function(p) { return p.status !== 'merged' && p.id !== mergeSource; }).map(function(p) {
                      return h("option", { key: p.id, value: p.id },
                        p.name + " (" + p.slug + ") \u2014 " + p.status);
                    })
                  ),

                  // Merge button
                  h("button", {
                    onClick: executeMerge,
                    disabled: !mergeSource || !mergeTarget || mergeSource === mergeTarget || merging,
                    style: { width:"100%", padding:"10px 16px",
                      background: (!mergeSource || !mergeTarget || merging) ? "#3A3A50" : "#E07A2F",
                      color: (!mergeSource || !mergeTarget || merging) ? "#64748B" : "white",
                      border:"none", borderRadius:8, fontSize:13, fontWeight:600,
                      cursor: (!mergeSource || !mergeTarget || merging) ? "not-allowed" : "pointer",
                      fontFamily:"inherit" }
                  }, merging ? "Merging..." : "Merge Projects"),

                  // Result message
                  mergeResult && h("div", {
                    style: { marginTop:12, padding:"10px 14px", borderRadius:8, fontSize:12,
                      background: mergeResult.success ? "rgba(16,185,129,0.1)" : "rgba(239,68,68,0.1)",
                      color: mergeResult.success ? "#10B981" : "#EF4444",
                      border: "1px solid " + (mergeResult.success ? "rgba(16,185,129,0.2)" : "rgba(239,68,68,0.2)") }
                  }, mergeResult.success
                    ? "\u2705 Merged \"" + mergeResult.merged_from + "\" into \"" + mergeResult.merged_into + "\""
                    : "\u274C " + (mergeResult.error || "Merge failed"))
                )
          ),

          // Sign out link
          h("div", { style: { textAlign:"center", marginTop:24 } },
            h("button", {
              onClick: handleLogout,
              style: { background:"none", border:"none", color:"#64748B", fontSize:12,
                cursor:"pointer", fontFamily:"inherit" }
            }, "Sign out")
          )
        ));
      }

      // Welcome transition overlay
      if (transition === 1 || transition === 2) {
        const isRevealing = transition === 2;
        return h("div", { style: { position:"relative", minHeight:"100vh" } },
          // Dashboard renders underneath (invisible at first, then fades in)
          h("div", {
            style: { opacity: isRevealing ? 1 : 0, transition:"opacity 0.8s ease-out" }
          }, h(App)),

          // Welcome overlay
          h("div", {
            style: {
              position:"fixed", top:0, left:0, right:0, bottom:0, zIndex:9999,
              display:"flex", alignItems:"center", justifyContent:"center",
              flexDirection:"column", background:"#1C1C2A",
              opacity: isRevealing ? 0 : 1,
              transition:"opacity 0.8s ease-out",
              pointerEvents: isRevealing ? "none" : "auto"
            }
          },
            // Animated logo
            h("div", {
              style: {
                width:72, height:72, background:"#E07A2F", borderRadius:18,
                display:"flex", alignItems:"center", justifyContent:"center",
                marginBottom:20, animation:"welcomePulse 1.2s ease-in-out",
                boxShadow:"0 0 60px rgba(224,122,47,0.4)"
              }
            }, h("span", {
              style: { color:"white", fontWeight:800, fontSize:34 }
            }, "V")),

            // Welcome text
            h("div", {
              style: {
                color:"#FBF7F2", fontSize:24, fontWeight:700,
                fontFamily:"Inter, system-ui, sans-serif",
                animation:"welcomeFadeUp 0.8s ease-out",
                marginBottom:6
              }
            }, "Welcome back"),

            // Email subtitle
            h("div", {
              style: {
                color:"#64748B", fontSize:14,
                fontFamily:"Inter, system-ui, sans-serif",
                animation:"welcomeFadeUp 0.8s ease-out 0.15s both"
              }
            }, session.user?.email || ""),

            // Animated line
            h("div", {
              style: {
                width:200, height:2, marginTop:28,
                background:"linear-gradient(90deg, transparent, #E07A2F, transparent)",
                animation:"welcomeLine 1.4s ease-in-out",
                borderRadius:1
              }
            })
          )
        );
      }

      return h(App);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(LoginGate)
    );
  </script>
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes welcomePulse {
      0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
      50% { transform: scale(1.15) rotate(2deg); opacity: 1; }
      70% { transform: scale(0.95) rotate(-1deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    @keyframes welcomeFadeUp {
      0% { opacity: 0; transform: translateY(16px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes welcomeLine {
      0% { width: 0; opacity: 0; }
      30% { opacity: 1; }
      100% { width: 200px; opacity: 1; }
    }
  </style>
</body>
</html>
