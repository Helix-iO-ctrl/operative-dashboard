  <script type="text/babel">
    const { useState, useEffect } = React;
    const d = window.PROJECT_DATA;

    const STATUS = {
      done:          { label: "Done",        dot: "#059669", badge: "#DCFCE7", badgeText: "#166534" },
      "in-progress": { label: "In Progress", dot: "#2563EB", badge: "#DBEAFE", badgeText: "#1E40AF" },
      blocked:       { label: "Blocked",     dot: "#DC2626", badge: "#FEE2E2", badgeText: "#991B1B" },
      todo:          { label: "To Do",       dot: "#9CA3AF", badge: "#F3F4F6", badgeText: "#6B7280" },
    };
    const PRIORITY = {
      high:   { label: "High", color: "#DC2626", bg: "#FEE2E2" },
      medium: { label: "Med",  color: "#D97706", bg: "#FEF3C7" },
      low:    { label: "Low",  color: "#6B7280", bg: "#F3F4F6" },
    };
    const URGENCY = {
      critical: { color: "#DC2626", bg: "#FEF2F2", label: "Critical" },
      high:     { color: "#D97706", bg: "#FFFBEB", label: "High" },
      medium:   { color: "#2563EB", bg: "#EFF6FF", label: "Medium" },
    };

    const BRAND = "#E07A2F"; // Velo Amber — finalized Mar 6, 2026

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    }

    function Badge({ color, bg, children }) {
      return (
        <span style={{ display:"inline-flex", alignItems:"center", background:bg, color,
          fontSize:11, fontWeight:600, padding:"2px 8px", borderRadius:4, whiteSpace:"nowrap" }}>
          {children}
        </span>
      );
    }

    function ProgressBar({ done, total, color }) {
      const pct = total > 0 ? Math.round((done/total)*100) : 0;
      return (
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ flex:1, height:4, background:"#F1F5F9", borderRadius:2, overflow:"hidden" }}>
            <div style={{ width:`${pct}%`, height:"100%", background:color, borderRadius:2, transition:"width .5s ease" }} />
          </div>
          <span style={{ fontSize:11, color:"#94A3B8", minWidth:28, textAlign:"right" }}>{pct}%</span>
        </div>
      );
    }

    function TaskTable({ tasks, comments = {}, onCommentAdded }) {
      const [hoveredTask, setHoveredTask]   = useState(null);
      const [openPanel, setOpenPanel]       = useState(null);
      const [panelName, setPanelName]       = useState('');
      const [panelBody, setPanelBody]       = useState('');
      const [panelError, setPanelError]     = useState('');
      const [panelLoading, setPanelLoading] = useState(false);
      const [assetModal, setAssetModal]     = useState(null); // assetPath string or null

      // localStorage-backed set of assetPaths the user has already opened
      const [viewedAssets, setViewedAssets] = useState(() => {
        try { return new Set(JSON.parse(localStorage.getItem('velo_viewed_assets_v1') || '[]')); }
        catch { return new Set(); }
      });

      function openAsset(assetPath) {
        setAssetModal(assetPath);
        if (!viewedAssets.has(assetPath)) {
          const updated = new Set([...viewedAssets, assetPath]);
          setViewedAssets(updated);
          localStorage.setItem('velo_viewed_assets_v1', JSON.stringify([...updated]));
        }
      }

      function openComment(taskId) {
        setOpenPanel(taskId);
        setPanelName(''); setPanelBody(''); setPanelError('');
      }
      function closePanel() {
        setOpenPanel(null);
        setPanelName(''); setPanelBody(''); setPanelError('');
      }
      async function submitComment(t) {
        setPanelLoading(true); setPanelError('');
        try {
          const res = await fetch(`${window.SUPABASE_URL}/rest/v1/comments`, {
            method: 'POST',
            headers: {
              'apikey': window.SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
            },
            body: JSON.stringify({
              project_slug: window.PROJECT_SLUG,
              item_type: 'task',
              item_id: String(t.id),
              item_text: t.text,
              commenter_name: panelName.trim(),
              body: panelBody.trim(),
            }),
          });
          if (!res.ok) throw new Error(`Error ${res.status}`);
          const [newComment] = await res.json();
          onCommentAdded(newComment);
          closePanel();
        } catch(e) {
          setPanelError('Something went wrong — please try again.');
          console.error('Comment submit failed:', e);
        } finally {
          setPanelLoading(false);
        }
      }

      const canSend = panelName.trim() && panelBody.trim() && !panelLoading;

      return (
        <>
        {/* ── Asset preview modal ── */}
        {assetModal && (
          <div onClick={() => setAssetModal(null)} style={{
            position:"fixed", inset:0, background:"rgba(15,23,42,0.65)",
            zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center",
            padding:24 }}>
            <div onClick={e => e.stopPropagation()} style={{
              background:"white", borderRadius:14, width:"90vw", height:"86vh",
              maxWidth:1100, display:"flex", flexDirection:"column", overflow:"hidden",
              boxShadow:"0 32px 80px rgba(0,0,0,0.35)" }}>
              {/* Modal header */}
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                padding:"12px 20px", borderBottom:"1px solid #E2E8F0", flexShrink:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ width:8, height:8, borderRadius:"50%", background:BRAND }} />
                  <span style={{ fontSize:13, fontWeight:600, color:"#1E293B" }}>Asset Preview</span>
                  <span style={{ fontSize:11, color:"#94A3B8", fontFamily:"'SF Mono',monospace" }}>
                    {assetModal}
                  </span>
                </div>
                <button onClick={() => setAssetModal(null)} style={{
                  background:"#F1F5F9", border:"none", borderRadius:6,
                  width:28, height:28, fontSize:14, cursor:"pointer",
                  color:"#64748B", display:"flex", alignItems:"center", justifyContent:"center",
                  fontFamily:"inherit", lineHeight:1 }}>✕</button>
              </div>
              {/* iframe — no download controls */}
              <iframe
                src={assetModal}
                title="Asset Preview"
                sandbox="allow-scripts allow-same-origin"
                style={{ flex:1, border:"none", width:"100%", display:"block" }}
              />
            </div>
          </div>
        )}
        <table>
          <thead>
            <tr style={{ background:"#F8FAFC" }}>
              {["Task","Priority","Status"].map(h => (
                <th key={h} style={{ padding:"9px 16px", textAlign:"left", fontSize:11,
                  fontWeight:600, color:"#94A3B8", textTransform:"uppercase",
                  letterSpacing:"0.06em", borderBottom:"1px solid #E2E8F0" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {tasks.map(t => {
              const s = STATUS[t.status]; const p = PRIORITY[t.priority];
              const taskComments  = comments[`task-${t.id}`] || [];
              const isPanelOpen   = openPanel === t.id;
              const hasBelowContent = taskComments.length > 0 || isPanelOpen;
              return (
                <React.Fragment key={t.id}>
                  {/* ── Task row ── */}
                  <tr
                    onMouseEnter={() => setHoveredTask(t.id)}
                    onMouseLeave={() => setHoveredTask(null)}
                    style={{ background: hoveredTask === t.id ? '#FAFBFF' : 'white' }}
                  >
                    <td style={{ padding:"11px 16px", borderBottom: hasBelowContent ? "none" : "1px solid #F1F5F9" }}>
                      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
                        <div style={{ display:"flex", alignItems:"flex-start", gap:9, flex:1 }}>
                          <span style={{ display:"inline-block", width:7, height:7, borderRadius:"50%",
                            background:s.dot, marginTop:4, flexShrink:0 }} />
                          <div>
                            <div style={{ fontSize:13, color:t.status==="done"?"#94A3B8":"#1E293B",
                              textDecoration:t.status==="done"?"line-through":"none", lineHeight:1.5 }}>
                              {t.text}
                            </div>
                            {t.assetPath && (
                              <button onClick={() => openAsset(t.assetPath)} style={{
                                marginTop:5, background:"none", border:`1px solid ${BRAND}`,
                                borderRadius:5, padding:"2px 9px", fontSize:11, color:BRAND,
                                cursor:"pointer", fontFamily:"inherit",
                                display:"inline-flex", alignItems:"center", gap:5,
                                textDecoration:"none" }}>
                                {!viewedAssets.has(t.assetPath) && (
                                  <span style={{ background:BRAND, color:"white", fontSize:9,
                                    fontWeight:700, borderRadius:3, padding:"1px 5px",
                                    letterSpacing:"0.06em", textTransform:"uppercase" }}>NEW</span>
                                )}
                                View asset →
                              </button>
                            )}
                            {t.blocker && <div style={{ fontSize:11, color:"#DC2626", marginTop:3 }}>⚠ {t.blocker}</div>}
                          </div>
                        </div>
                        {hoveredTask === t.id && !isPanelOpen && (
                          <button onClick={() => openComment(t.id)} style={{
                            background:"none", border:"1px solid #E2E8F0", borderRadius:4,
                            padding:"2px 8px", fontSize:11, color:"#64748B", cursor:"pointer",
                            display:"flex", alignItems:"center", gap:4, whiteSpace:"nowrap", flexShrink:0,
                            fontFamily:"inherit" }}>
                            💬 Note
                          </button>
                        )}
                      </div>
                    </td>
                    <td style={{ padding:"11px 16px", borderBottom: hasBelowContent ? "none" : "1px solid #F1F5F9", whiteSpace:"nowrap" }}>
                      <Badge color={p.color} bg={p.bg}>{p.label}</Badge>
                    </td>
                    <td style={{ padding:"11px 16px", borderBottom: hasBelowContent ? "none" : "1px solid #F1F5F9", whiteSpace:"nowrap" }}>
                      <Badge color={s.badgeText} bg={s.badge}>{s.label}</Badge>
                    </td>
                  </tr>

                  {/* ── Inline comment panel ── */}
                  {isPanelOpen && (
                    <tr>
                      <td colSpan={3} style={{
                        padding:"0 16px 12px 44px",
                        borderBottom: taskComments.length > 0 ? "none" : "1px solid #F1F5F9",
                        background:"#F8FAFC" }}>
                        <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:8, padding:"14px 16px" }}>
                          <div style={{ fontSize:12, color:"#64748B", marginBottom:12 }}>
                            Leave a note on: <strong style={{ color:"#374151" }}>"{t.text}"</strong>
                          </div>
                          <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", gap:"8px 12px", alignItems:"center" }}>
                            <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Your name</label>
                            <input
                              value={panelName}
                              onChange={e => setPanelName(e.target.value)}
                              placeholder="e.g. Hayden"
                              style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                                borderRadius:6, outline:"none", fontFamily:"inherit", color:"#1E293B" }}
                            />
                            <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Note</label>
                            <textarea
                              value={panelBody}
                              onChange={e => setPanelBody(e.target.value)}
                              placeholder="Type your note here..."
                              rows={2}
                              style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                                borderRadius:6, outline:"none", fontFamily:"inherit", resize:"vertical", color:"#1E293B" }}
                            />
                          </div>
                          {panelError && <div style={{ fontSize:12, color:"#DC2626", marginTop:8 }}>⚠ {panelError}</div>}
                          <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:12 }}>
                            <button onClick={closePanel} style={{
                              fontSize:12, padding:"6px 14px", border:"1px solid #E2E8F0",
                              borderRadius:6, background:"white", color:"#64748B", cursor:"pointer", fontFamily:"inherit" }}>
                              Cancel
                            </button>
                            <button onClick={() => submitComment(t)} disabled={!canSend} style={{
                              fontSize:12, padding:"6px 14px", border:"none", borderRadius:6,
                              fontFamily:"inherit", fontWeight:600,
                              cursor: canSend ? "pointer" : "not-allowed",
                              background: canSend ? BRAND : "#E2E8F0",
                              color: canSend ? "white" : "#94A3B8" }}>
                              {panelLoading ? 'Sending...' : 'Send →'}
                            </button>
                          </div>
                        </div>
                      </td>
                    </tr>
                  )}

                  {/* ── Existing comments ── */}
                  {taskComments.map((c, ci) => (
                    <tr key={`c-${ci}`}>
                      <td colSpan={3} style={{
                        padding: ci === taskComments.length - 1 ? "4px 16px 10px 44px" : "4px 16px 4px 44px",
                        borderBottom: ci === taskComments.length - 1 ? "1px solid #F1F5F9" : "none",
                        background:"#F8FAFC" }}>
                        <span style={{ fontSize:12, color:"#64748B" }}>
                          💬 <strong style={{ color:"#374151", fontWeight:600 }}>{c.commenter_name}</strong>
                          , {formatDate(c.created_at)} · "{c.body}"
                        </span>
                      </td>
                    </tr>
                  ))}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
        </>
      );
    }

    const REACTIONS = [
      { key:'agree',    emoji:'👍', label:'Agreed',   defaultBody:'Agreed'   },
      { key:'question', emoji:'❓', label:'Question',  defaultBody:'Question' },
      { key:'concern',  emoji:'⚠️', label:'Concern',  defaultBody:'Concern'  },
    ];

    function DecisionRow({ dec, index, comments, onCommentAdded }) {
      const [selected, setSelected] = useState(null);
      const [name, setName]         = useState('');
      const [note, setNote]         = useState('');
      const [error, setError]       = useState('');
      const [loading, setLoading]   = useState(false);

      const decComments = comments[`decision-${index}`] || [];
      const counts = { agree:0, question:0, concern:0 };
      decComments.forEach(c => { if (c.reaction) counts[c.reaction]++; });
      const notes = decComments.filter(c => !REACTIONS.map(r=>r.defaultBody).includes(c.body));

      function pickReaction(key) {
        setSelected(key === selected ? null : key);
        setName(''); setNote(''); setError('');
      }

      async function submitReaction() {
        setLoading(true); setError('');
        const r = REACTIONS.find(r => r.key === selected);
        try {
          const res = await fetch(`${window.SUPABASE_URL}/rest/v1/comments`, {
            method: 'POST',
            headers: {
              'apikey': window.SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
            },
            body: JSON.stringify({
              project_slug: window.PROJECT_SLUG,
              item_type: 'decision',
              item_id: String(index),
              item_text: dec.title,
              commenter_name: name.trim(),
              body: note.trim() || r.defaultBody,
              reaction: selected,
            }),
          });
          if (!res.ok) throw new Error(`Error ${res.status}`);
          const [newComment] = await res.json();
          onCommentAdded(newComment);
          setSelected(null); setName(''); setNote('');
        } catch(e) {
          setError('Something went wrong — please try again.');
          console.error('Reaction submit failed:', e);
        } finally {
          setLoading(false);
        }
      }

      const canConfirm = name.trim() && !loading;

      return (
        <div style={{ borderBottom:"1px solid #F1F5F9" }}>
          <div style={{ display:"grid", gridTemplateColumns:"130px 1fr", padding:"16px 18px", gap:16 }}>
            <span style={{ fontSize:12, color:"#94A3B8", paddingTop:1 }}>{dec.date}</span>
            <div>
              <div style={{ fontSize:13, fontWeight:600, color:"#0F172A", marginBottom:4 }}>{dec.title}</div>
              <div style={{ fontSize:12, color:"#64748B", lineHeight:1.6, marginBottom:12 }}>{dec.detail}</div>

              {/* Notes from reactions that included custom text */}
              {notes.map((c, ci) => (
                <div key={ci} style={{ fontSize:12, color:"#64748B", marginBottom:6 }}>
                  {REACTIONS.find(r=>r.key===c.reaction)?.emoji || '💬'}{' '}
                  <strong style={{ color:"#374151" }}>{c.commenter_name}</strong>
                  , {formatDate(c.created_at)} · "{c.body}"
                </div>
              ))}

              {/* Reaction buttons */}
              <div style={{ display:"flex", gap:8, marginTop: notes.length ? 10 : 0 }}>
                {REACTIONS.map(r => {
                  const isActive = selected === r.key;
                  return (
                    <button key={r.key} onClick={() => pickReaction(r.key)} style={{
                      fontSize:12, padding:"5px 12px", borderRadius:6, fontFamily:"inherit",
                      border: isActive ? `1px solid ${BRAND}` : '1px solid #E2E8F0',
                      background: isActive ? '#ECFDF5' : 'white',
                      color: isActive ? BRAND : '#374151',
                      fontWeight: isActive ? 600 : 400,
                      cursor:"pointer", transition:"all .1s" }}>
                      {r.emoji} {r.label}{counts[r.key] > 0 ? ` (${counts[r.key]})` : ''}
                    </button>
                  );
                })}
              </div>

              {/* Confirm form — appears when a reaction is selected */}
              {selected && (
                <div style={{ marginTop:10, padding:"12px 14px", background:"#F8FAFC",
                  borderRadius:8, border:"1px solid #E2E8F0" }}>
                  <div style={{ fontSize:12, color:"#64748B", marginBottom:8 }}>
                    {REACTIONS.find(r=>r.key===selected).emoji} {REACTIONS.find(r=>r.key===selected).label} — confirm your name and add an optional note
                  </div>
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                    <input
                      value={name}
                      onChange={e => setName(e.target.value)}
                      placeholder="Your name"
                      style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                        borderRadius:6, outline:"none", fontFamily:"inherit", color:"#1E293B", width:160 }}
                    />
                    <input
                      value={note}
                      onChange={e => setNote(e.target.value)}
                      placeholder="Add a note (optional)"
                      style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                        borderRadius:6, outline:"none", fontFamily:"inherit", color:"#1E293B", flex:1, minWidth:160 }}
                    />
                  </div>
                  {error && <div style={{ fontSize:12, color:"#DC2626", marginTop:6 }}>⚠ {error}</div>}
                  <div style={{ display:"flex", gap:8, marginTop:8 }}>
                    <button onClick={() => { setSelected(null); setName(''); setNote(''); }} style={{
                      fontSize:12, padding:"5px 12px", border:"1px solid #E2E8F0",
                      borderRadius:6, background:"white", color:"#64748B", cursor:"pointer", fontFamily:"inherit" }}>
                      Cancel
                    </button>
                    <button onClick={submitReaction} disabled={!canConfirm} style={{
                      fontSize:12, padding:"5px 12px", border:"none", borderRadius:6,
                      fontFamily:"inherit", fontWeight:600,
                      cursor: canConfirm ? "pointer" : "not-allowed",
                      background: canConfirm ? BRAND : "#E2E8F0",
                      color: canConfirm ? "white" : "#94A3B8" }}>
                      {loading ? 'Submitting...' : 'Confirm →'}
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function QuestionRow({ item, index, comments, onCommentAdded }) {
      const [name, setName]       = useState('');
      const [answer, setAnswer]   = useState('');
      const [error, setError]     = useState('');
      const [loading, setLoading] = useState(false);

      const u = URGENCY[item.urgency];
      const qKey = `question-${item.id || index}`;
      const qComments = comments[qKey] || [];
      const canSubmit = name.trim() && answer.trim() && !loading;

      async function submitAnswer() {
        setLoading(true); setError('');
        try {
          const res = await fetch(`${window.SUPABASE_URL}/rest/v1/comments`, {
            method: 'POST',
            headers: {
              'apikey': window.SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
            },
            body: JSON.stringify({
              project_slug: window.PROJECT_SLUG,
              item_type: 'question',
              item_id: item.id || String(index),
              item_text: item.q,
              commenter_name: name.trim(),
              body: answer.trim(),
            }),
          });
          if (!res.ok) throw new Error(`Error ${res.status}`);
          const [newComment] = await res.json();
          onCommentAdded(newComment);
          setName(''); setAnswer('');
        } catch(e) {
          setError('Something went wrong — please try again.');
          console.error('Answer submit failed:', e);
        } finally {
          setLoading(false);
        }
      }

      return (
        <div style={{ borderBottom:"1px solid #F1F5F9" }}>
          <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", padding:"16px 18px", gap:14, alignItems:"start" }}>
            <Badge color={u.color} bg={u.bg}>{u.label}</Badge>
            <div>
              <div style={{ fontSize:13, color:"#0F172A", fontWeight:500, marginBottom:4 }}>{item.q}</div>
              <div style={{ fontSize:12, color:"#64748B", lineHeight:1.5, marginBottom:12 }}>{item.note}</div>

              {/* Existing answers */}
              {qComments.map((c, ci) => (
                <div key={ci} style={{ fontSize:12, marginBottom:10, padding:"10px 12px",
                  background:"#F8FAFC", borderRadius:6, borderLeft:`2px solid ${BRAND}` }}>
                  <span style={{ color:"#94A3B8" }}>
                    <strong style={{ color:"#374151" }}>{c.commenter_name}</strong>, {formatDate(c.created_at)}
                  </span>
                  <div style={{ marginTop:4, color:"#1E293B", lineHeight:1.6, fontSize:13 }}>{c.body}</div>
                </div>
              ))}

              {/* Answer form */}
              <textarea
                value={answer}
                onChange={e => setAnswer(e.target.value)}
                placeholder="Type your answer here..."
                rows={2}
                style={{ width:"100%", fontSize:13, padding:"8px 10px", border:"1px solid #E2E8F0",
                  borderRadius:6, outline:"none", fontFamily:"inherit", resize:"vertical",
                  color:"#1E293B", marginBottom:8, display:"block" }}
              />
              <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                <input
                  value={name}
                  onChange={e => setName(e.target.value)}
                  placeholder="Your name"
                  style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                    borderRadius:6, outline:"none", fontFamily:"inherit", color:"#1E293B", width:160 }}
                />
                <button onClick={submitAnswer} disabled={!canSubmit} style={{
                  fontSize:12, padding:"6px 16px", border:"none", borderRadius:6,
                  fontFamily:"inherit", fontWeight:600,
                  cursor: canSubmit ? "pointer" : "not-allowed",
                  background: canSubmit ? BRAND : "#E2E8F0",
                  color: canSubmit ? "white" : "#94A3B8" }}>
                  {loading ? 'Submitting...' : 'Submit Answer →'}
                </button>
                {error && <span style={{ fontSize:12, color:"#DC2626" }}>⚠ {error}</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [sel, setSel]           = useState("strategy");
      const [tab, setTab]           = useState("overview");
      const [comments, setComments] = useState({});

      useEffect(() => {
        async function fetchComments() {
          try {
            const res = await fetch(
              `${window.SUPABASE_URL}/rest/v1/comments` +
              `?project_slug=eq.${window.PROJECT_SLUG}&order=created_at.asc`,
              { headers: {
                  'apikey': window.SUPABASE_ANON_KEY,
                  'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
              }}
            );
            if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
            const data = await res.json();
            const grouped = {};
            data.forEach(c => {
              const key = `${c.item_type}-${c.item_id}`;
              if (!grouped[key]) grouped[key] = [];
              grouped[key].push(c);
            });
            setComments(grouped);
          } catch (e) {
            console.error('Comments fetch failed:', e);
          }
        }
        fetchComments();
      }, []);

      function onCommentAdded(newComment) {
        setComments(prev => {
          const key = `${newComment.item_type}-${newComment.item_id}`;
          return { ...prev, [key]: [...(prev[key] || []), newComment] };
        });
      }

      const selected  = d.disciplines.find(x => x.id === sel);
      const total     = d.disciplines.reduce((a,disc) => a + disc.tasks.length, 0);
      const done      = d.disciplines.reduce((a,disc) => a + disc.tasks.filter(t=>t.status==="done").length, 0);
      const inProg    = d.disciplines.reduce((a,disc) => a + disc.tasks.filter(t=>t.status==="in-progress").length, 0);
      const blocked   = d.disciplines.reduce((a,disc) => a + disc.tasks.filter(t=>t.status==="blocked").length, 0);
      const pct       = total > 0 ? Math.round((done/total)*100) : 0;

      return (
        <div style={{ minHeight:"100vh", background:"#F8FAFC", fontFamily:"'Inter',system-ui,sans-serif" }}>

          {/* ── TOP BAR ── */}
          <div style={{ background:"white", borderBottom:"1px solid #E2E8F0", padding:"0 28px",
            display:"flex", alignItems:"center", justifyContent:"space-between",
            height:56, position:"sticky", top:0, zIndex:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:20 }}>
              <div style={{ display:"flex", alignItems:"center", gap:9 }}>
                <div style={{ width:28, height:28, borderRadius:6, background:BRAND,
                  display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <rect x="1" y="1" width="5" height="5" rx="1" fill="white" opacity=".9"/>
                    <rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity=".6"/>
                    <rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity=".6"/>
                    <rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity=".9"/>
                  </svg>
                </div>
                <span style={{ fontSize:14, fontWeight:700, color:"#0F172A" }}>{d.name}</span>
              </div>
              <span style={{ color:"#E2E8F0" }}>|</span>
              <div style={{ display:"flex", gap:2 }}>
                {[["overview","Overview"],["tasks","Tasks"],["decisions","Decisions"],["updates","Weekly Updates"],["questions","Open Questions"]].map(([id,label])=>(
                  <button key={id} onClick={()=>setTab(id)} style={{
                    background: tab===id?"#F1F5F9":"transparent", border:"none", cursor:"pointer",
                    padding:"6px 12px", borderRadius:6, fontSize:13,
                    fontWeight: tab===id?600:400,
                    color: tab===id?"#0F172A":"#64748B", fontFamily:"inherit" }}>
                    {label}
                  </button>
                ))}
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <span style={{ fontSize:12, color:"#94A3B8" }}>Updated {d.lastUpdated}</span>
              <div style={{ display:"flex", alignItems:"center", gap:6, background:"#F0FDF4",
                border:"1px solid #BBF7D0", padding:"4px 10px", borderRadius:6 }}>
                <div style={{ width:6, height:6, borderRadius:"50%", background:"#059669" }} />
                <span style={{ fontSize:12, fontWeight:600, color:"#166534" }}>
                  Phase {d.currentPhase+1}: {d.phases[d.currentPhase]}
                </span>
              </div>
            </div>
          </div>

          <div style={{ maxWidth:1100, margin:"0 auto", padding:"28px" }}>

            {/* ── OVERVIEW ── */}
            {tab==="overview" && <>

              {/* Phase bar */}
              <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10,
                padding:"16px 20px", marginBottom:20,
                display:"flex", alignItems:"center", gap:20 }}>
                <span style={{ fontSize:11, fontWeight:600, color:"#64748B", whiteSpace:"nowrap" }}>ENGAGEMENT PHASE</span>
                <div style={{ display:"flex", flex:1, gap:8 }}>
                  {d.phases.map((p,i)=>(
                    <div key={p} style={{ flex:1 }}>
                      <div style={{ height:5, borderRadius:3,
                        background: i<=d.currentPhase ? BRAND : "#E2E8F0",
                        opacity: i<d.currentPhase?0.4:1 }} />
                      <div style={{ fontSize:11, marginTop:5,
                        color:i===d.currentPhase ? BRAND : "#94A3B8",
                        fontWeight:i===d.currentPhase?600:400 }}>{p}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Stat cards */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:12, marginBottom:20 }}>
                {[
                  { label:"Total Tasks",  value:total,     color:"#1E293B", bg:"white",   border:"#E2E8F0" },
                  { label:"Done",         value:done,      color:"#059669", bg:"#F0FDF4", border:"#BBF7D0" },
                  { label:"In Progress",  value:inProg,    color:"#2563EB", bg:"#EFF6FF", border:"#BFDBFE" },
                  { label:"Blocked",      value:blocked,   color:"#DC2626", bg:"#FEF2F2", border:"#FECACA" },
                  { label:"Overall",      value:`${pct}%`, color:"#7C3AED", bg:"#F5F3FF", border:"#DDD6FE" },
                ].map(s=>(
                  <div key={s.label} style={{ background:s.bg, border:`1px solid ${s.border}`,
                    borderRadius:10, padding:"16px 18px" }}>
                    <div style={{ fontSize:26, fontWeight:700, color:s.color, lineHeight:1 }}>{s.value}</div>
                    <div style={{ fontSize:11, color:"#94A3B8", marginTop:5, fontWeight:500 }}>{s.label}</div>
                  </div>
                ))}
              </div>

              {/* Disciplines table */}
              <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10,
                overflow:"hidden", marginBottom:20 }}>
                <div style={{ padding:"14px 18px", borderBottom:"1px solid #F1F5F9",
                  display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontSize:13, fontWeight:600, color:"#0F172A" }}>Work Areas</span>
                  <span style={{ fontSize:11, color:"#94A3B8" }}>Click a row to see tasks ↓</span>
                </div>
                <table>
                  <thead>
                    <tr style={{ background:"#F8FAFC" }}>
                      {["Area","Progress","Tasks","Active","Blockers","Owner"].map(h=>(
                        <th key={h} style={{ padding:"9px 16px", textAlign:"left", fontSize:11,
                          fontWeight:600, color:"#94A3B8", textTransform:"uppercase",
                          letterSpacing:"0.06em", borderBottom:"1px solid #E2E8F0" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {d.disciplines.map(disc=>{
                      const dDone  = disc.tasks.filter(t=>t.status==="done").length;
                      const dProg  = disc.tasks.filter(t=>t.status==="in-progress").length;
                      const dBlock = disc.tasks.filter(t=>t.status==="blocked").length;
                      const isSel  = sel===disc.id;
                      return (
                        <tr key={disc.id} onClick={()=>setSel(disc.id)} style={{
                          cursor:"pointer", background:isSel?disc.lightColor:"white",
                          borderLeft:`3px solid ${isSel?disc.color:"transparent"}`,
                          transition:"background .15s" }}>
                          <td style={{ padding:"12px 16px", borderBottom:"1px solid #F1F5F9" }}>
                            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                              <div style={{ width:28, height:28, borderRadius:6,
                                background:disc.lightColor, border:`1px solid ${disc.borderColor}`,
                                display:"flex", alignItems:"center", justifyContent:"center",
                                fontSize:12, fontWeight:700, color:disc.color }}>
                                {disc.label[0]}
                              </div>
                              <span style={{ fontSize:13, fontWeight:600, color:"#1E293B" }}>{disc.label}</span>
                            </div>
                          </td>
                          <td style={{ padding:"12px 16px", borderBottom:"1px solid #F1F5F9", width:180 }}>
                            <ProgressBar done={dDone} total={disc.tasks.length} color={disc.color} />
                          </td>
                          <td style={{ padding:"12px 16px", borderBottom:"1px solid #F1F5F9", textAlign:"center" }}>
                            <span style={{ fontSize:13, fontWeight:600, color:"#1E293B" }}>{disc.tasks.length}</span>
                          </td>
                          <td style={{ padding:"12px 16px", borderBottom:"1px solid #F1F5F9" }}>
                            {dProg>0 && <Badge color={STATUS["in-progress"].badgeText} bg={STATUS["in-progress"].badge}>{dProg} active</Badge>}
                          </td>
                          <td style={{ padding:"12px 16px", borderBottom:"1px solid #F1F5F9" }}>
                            {dBlock>0
                              ? <Badge color={STATUS.blocked.badgeText} bg={STATUS.blocked.badge}>{dBlock} blocked</Badge>
                              : <span style={{ fontSize:11, color:"#CBD5E1" }}>—</span>}
                          </td>
                          <td style={{ padding:"12px 16px", borderBottom:"1px solid #F1F5F9" }}>
                            <span style={{ fontSize:12, color:"#94A3B8" }}>{disc.owner}</span>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              {/* Task detail */}
              {selected && (
                <div style={{ background:"white", border:`1px solid ${selected.borderColor}`,
                  borderRadius:10, overflow:"hidden" }}>
                  <div style={{ padding:"14px 18px", borderBottom:"1px solid #F1F5F9",
                    background:selected.lightColor, display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ width:28, height:28, borderRadius:6, background:"white",
                      border:`1px solid ${selected.borderColor}`,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:12, fontWeight:700, color:selected.color }}>{selected.label[0]}</div>
                    <span style={{ fontSize:13, fontWeight:600, color:"#0F172A" }}>{selected.label} Tasks</span>
                    <span style={{ fontSize:11, color:"#94A3B8" }}>{selected.tasks.length} total</span>
                  </div>
                  <TaskTable tasks={selected.tasks} comments={comments} onCommentAdded={onCommentAdded} />
                </div>
              )}
            </>}

            {/* ── TASKS ── */}
            {tab==="tasks" && (
              <div style={{ display:"grid", gridTemplateColumns:"200px 1fr", gap:16 }}>
                <div style={{ background:"white", border:"1px solid #E2E8F0",
                  borderRadius:10, overflow:"hidden", alignSelf:"start" }}>
                  {d.disciplines.map(disc=>{
                    const dDone = disc.tasks.filter(t=>t.status==="done").length;
                    return (
                      <div key={disc.id} onClick={()=>setSel(disc.id)} style={{
                        padding:"10px 14px", cursor:"pointer",
                        display:"flex", justifyContent:"space-between", alignItems:"center",
                        background:sel===disc.id?disc.lightColor:"white",
                        borderLeft:`3px solid ${sel===disc.id?disc.color:"transparent"}`,
                        borderBottom:"1px solid #F1F5F9" }}>
                        <span style={{ fontSize:13, fontWeight:sel===disc.id?600:400,
                          color:sel===disc.id?disc.color:"#374151" }}>{disc.label}</span>
                        <span style={{ fontSize:11, color:"#94A3B8" }}>{dDone}/{disc.tasks.length}</span>
                      </div>
                    );
                  })}
                </div>
                {selected && (
                  <div style={{ background:"white", border:"1px solid #E2E8F0",
                    borderRadius:10, overflow:"hidden" }}>
                    <div style={{ padding:"14px 18px", borderBottom:"1px solid #F1F5F9",
                      background:selected.lightColor }}>
                      <span style={{ fontSize:14, fontWeight:600, color:"#0F172A" }}>{selected.label}</span>
                    </div>
                    <TaskTable tasks={selected.tasks} comments={comments} onCommentAdded={onCommentAdded} />
                  </div>
                )}
              </div>
            )}

            {/* ── DECISIONS ── */}
            {tab==="decisions" && (
              <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10, overflow:"hidden" }}>
                <div style={{ padding:"14px 18px", borderBottom:"1px solid #F1F5F9" }}>
                  <span style={{ fontSize:13, fontWeight:600, color:"#0F172A" }}>Decision Log</span>
                  <span style={{ fontSize:12, color:"#94A3B8", marginLeft:8 }}>{d.decisions.length} recorded</span>
                </div>
                {d.decisions.map((dec, i) => (
                  <DecisionRow key={i} dec={dec} index={i} comments={comments} onCommentAdded={onCommentAdded} />
                ))}
                <div style={{ padding:"12px 18px", background:"#F8FAFC",
                  borderTop:"1px solid #E2E8F0", fontSize:12, color:"#94A3B8" }}>
                  💡 After each Cowork session, new decisions will be automatically logged here.
                </div>
              </div>
            )}

            {/* ── WEEKLY UPDATES ── */}
            {tab==="updates" && (
              <div>
                <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10,
                  overflow:"hidden", marginBottom:16 }}>
                  <div style={{ padding:"14px 18px", borderBottom:"1px solid #F1F5F9",
                    display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div>
                      <span style={{ fontSize:13, fontWeight:600, color:"#0F172A" }}>Weekly Snapshots</span>
                      <span style={{ fontSize:12, color:"#94A3B8", marginLeft:8 }}>
                        {d.weeklyUpdates.length} week{d.weeklyUpdates.length !== 1 ? "s" : ""} tracked
                      </span>
                    </div>
                    <span style={{ fontSize:11, color:"#94A3B8" }}>Updated every Friday at 6:45am</span>
                  </div>

                  {d.weeklyUpdates.length === 0 ? (
                    <div style={{ padding:"40px 24px", textAlign:"center", color:"#94A3B8" }}>
                      <div style={{ fontSize:32, marginBottom:10 }}>📊</div>
                      <div style={{ fontSize:13, fontWeight:500, color:"#64748B", marginBottom:6 }}>
                        First snapshot posts this Friday
                      </div>
                      <div style={{ fontSize:12 }}>
                        Weekly progress summaries will appear here automatically — week over week.
                      </div>
                    </div>
                  ) : (
                    d.weeklyUpdates.slice().reverse().map((w, i) => (
                      <div key={i} style={{ display:"grid", gridTemplateColumns:"140px 1fr",
                        padding:"18px 18px", borderBottom:"1px solid #F8FAFC", gap:16, alignItems:"start" }}>
                        {/* Left — week label + date */}
                        <div>
                          <div style={{ fontSize:12, fontWeight:700, color:"#0F172A" }}>Week {w.week}</div>
                          <div style={{ fontSize:11, color:"#94A3B8", marginTop:2 }}>{w.dateRange}</div>
                          <div style={{ marginTop:10, display:"flex", alignItems:"center", gap:6 }}>
                            <div style={{ width:48, height:4, background:"#E2E8F0", borderRadius:2, overflow:"hidden" }}>
                              <div style={{ width:`${w.pct}%`, height:"100%", background:BRAND, borderRadius:2 }} />
                            </div>
                            <span style={{ fontSize:11, color:BRAND, fontWeight:600 }}>{w.pct}%</span>
                          </div>
                          <div style={{ marginTop:8, display:"flex", gap:8, flexWrap:"wrap" }}>
                            <span style={{ fontSize:11, color:"#059669", fontWeight:600 }}>✓ {w.done} done</span>
                            {w.blockers > 0 && (
                              <span style={{ fontSize:11, color:"#DC2626", fontWeight:600 }}>⚠ {w.blockers} blocked</span>
                            )}
                          </div>
                          {w.snapshotUrl && (
                            <a href={w.snapshotUrl} target="_blank" rel="noreferrer" style={{
                              display:"inline-block", marginTop:10, fontSize:11,
                              color:BRAND, textDecoration:"none", fontWeight:500 }}>
                              View full report →
                            </a>
                          )}
                        </div>

                        {/* Right — wins + next up */}
                        <div>
                          {w.wins && w.wins.length > 0 && (
                            <div style={{ marginBottom:10 }}>
                              <div style={{ fontSize:11, fontWeight:600, color:"#64748B",
                                textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:6 }}>
                                This Week
                              </div>
                              {w.wins.map((win, wi) => (
                                <div key={wi} style={{ fontSize:12, color:"#1E293B",
                                  marginBottom:4, display:"flex", gap:6 }}>
                                  <span style={{ color:"#059669", flexShrink:0 }}>✓</span>
                                  <span>{win}</span>
                                </div>
                              ))}
                            </div>
                          )}
                          {w.nextUp && w.nextUp.length > 0 && (
                            <div>
                              <div style={{ fontSize:11, fontWeight:600, color:"#64748B",
                                textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:6 }}>
                                Next Week
                              </div>
                              {w.nextUp.map((next, ni) => (
                                <div key={ni} style={{ fontSize:12, color:"#64748B",
                                  marginBottom:4, display:"flex", gap:6 }}>
                                  <span style={{ color:"#94A3B8", flexShrink:0 }}>→</span>
                                  <span>{next}</span>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            )}

            {/* ── OPEN QUESTIONS ── */}
            {tab==="questions" && (
              <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10, overflow:"hidden" }}>
                <div style={{ padding:"14px 18px", borderBottom:"1px solid #F1F5F9" }}>
                  <span style={{ fontSize:13, fontWeight:600, color:"#0F172A" }}>Open Questions</span>
                  <span style={{ fontSize:12, color:"#94A3B8", marginLeft:8 }}>
                    {d.openQuestions.length} need answers
                  </span>
                </div>
                {d.openQuestions.map((item, i) => (
                  <QuestionRow key={item.id || i} item={item} index={i} comments={comments} onCommentAdded={onCommentAdded} />
                ))}
              </div>
            )}

          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
