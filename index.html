    function App() {
      const [sel, setSel]           = useState("strategy");
      const [tab, setTab]           = useState("overview");
      const [comments, setComments] = useState({});
      const [previewUrl, setPreviewUrl]     = useState(null);
      const [previewTitle, setPreviewTitle] = useState("");
      const [assetFeedbackOpen, setAssetFeedbackOpen] = useState(false);
      const [assetLibExpanded, setAssetLibExpanded] = useState(null); // asset id for expanded version history
      const [assetPreview, setAssetPreview]         = useState(null); // { url, title }
      const [showDone, setShowDone]                 = useState(false); // collapse done tasks on overview
      const [taskFilter, setTaskFilter]              = useState(null); // null = all, "done" | "in-progress" | "blocked" | "todo"
      const [showProgressModal, setShowProgressModal]      = useState(false); // DNA helix progress modal

      // Lifted from TaskTable so section headers can also read it
      const [viewedAssets, setViewedAssets] = useState(() => {
        try { return new Set(JSON.parse(localStorage.getItem('velo_viewed_assets_v1') || '[]')); }
        catch { return new Set(); }
      });
      function onAssetViewed(assetPath) {
        if (!viewedAssets.has(assetPath)) {
          const updated = new Set([...viewedAssets, assetPath]);
          setViewedAssets(updated);
          localStorage.setItem('velo_viewed_assets_v1', JSON.stringify([...updated]));
        }
      }
      // Returns true if a discipline has at least one unviewed asset
      function discHasNew(disc) {
        return disc.tasks.some(t =>
          (t.assetPath && !viewedAssets.has(t.assetPath)) ||
          (t.groupAsset && !viewedAssets.has(t.groupAsset))
        );
      }

      useEffect(() => {
        async function fetchComments() {
          try {
            const res = await fetch(
              `${window.SUPABASE_URL}/rest/v1/comments` +
              `?project_slug=eq.${window.PROJECT_SLUG}&order=created_at.asc`,
              { headers: {
                  'apikey': window.SUPABASE_ANON_KEY,
                  'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
              }}
            );
            if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
            const data = await res.json();
            const grouped = {};
            data.forEach(c => {
              const key = `${c.item_type}-${c.item_id}`;
              if (!grouped[key]) grouped[key] = [];
              grouped[key].push(c);
            });
            setComments(grouped);
          } catch (e) {
            console.error('Comments fetch failed:', e);
          }
        }
        fetchComments();
      }, []);

      function onCommentAdded(newComment) {
        setComments(prev => {
          const key = `${newComment.item_type}-${newComment.item_id}`;
          return { ...prev, [key]: [...(prev[key] || []), newComment] };
        });
      }

      const selected  = d.disciplines.find(x => x.id === sel);
      const total     = d.disciplines.reduce((a,disc) => a + disc.tasks.length, 0);
      const done      = d.disciplines.reduce((a,disc) => a + disc.tasks.filter(t=>t.status==="done").length, 0);
      const inProg    = d.disciplines.reduce((a,disc) => a + disc.tasks.filter(t=>t.status==="in-progress").length, 0);
      const blocked   = d.disciplines.reduce((a,disc) => a + disc.tasks.filter(t=>t.status==="blocked").length, 0);
      const pct       = total > 0 ? Math.round((done/total)*100) : 0;

      return (
        <div style={{ minHeight:"100vh", background:"#F8FAFC", fontFamily:"'Inter',system-ui,sans-serif" }}>

          {/* ── Shared preview modal ── */}
          <PreviewModal url={previewUrl} title={previewTitle} onClose={() => { setPreviewUrl(null); setPreviewTitle(""); }} />

          {/* ── DNA Helix progress modal ── */}
          {showProgressModal && (
            <ProgressModal pct={pct} done={done} total={total} onClose={() => setShowProgressModal(false)} />
          )}

          {/* ── TOP BAR ── */}
          <div style={{ background:"white", borderBottom:"1px solid #E2E8F0", padding:"0 28px",
            display:"flex", alignItems:"center", justifyContent:"space-between",
            height:56, position:"sticky", top:0, zIndex:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:20 }}>
              <div style={{ display:"flex", alignItems:"center", gap:9 }}>
                <div style={{ width:28, height:28, borderRadius:6, background:BRAND,
                  display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <rect x="1" y="1" width="5" height="5" rx="1" fill="white" opacity=".9"/>
                    <rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity=".6"/>
                    <rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity=".6"/>
                    <rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity=".9"/>
                  </svg>
                </div>
                <span style={{ fontSize:14, fontWeight:700, color:"#0F172A" }}>{d.name}</span>
              </div>
              <span style={{ color:"#E2E8F0" }}>|</span>
              <div style={{ display:"flex", gap:2 }}>
                {[["overview","Overview"],["tasks","Tasks"],["decisions","Decisions"],["updates","Weekly Updates"],["questions","Open Questions"]].map(([id,label])=>(
                  <button key={id} onClick={()=>{ setTab(id); if (id !== "tasks") setTaskFilter(null); }} style={{
                    background: tab===id?"#F1F5F9":"transparent", border:"none", cursor:"pointer",
                    padding:"6px 12px", borderRadius:6, fontSize:13,
                    fontWeight: tab===id?600:400,
                    color: tab===id?"#0F172A":"#64748B", fontFamily:"inherit",
                    display:"flex", alignItems:"center", gap:6 }}>
                    {label}
                    {id==="questions" && d.openQuestions.length > 0 && (
                      <span style={{
                        background: BRAND, color:"white",
                        fontSize:10, fontWeight:700, borderRadius:10,
                        padding:"1px 6px", lineHeight:"16px", minWidth:16,
                        textAlign:"center" }}>
                        {d.openQuestions.length}
                      </span>
                    )}
                  </button>
                ))}
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <div style={{ textAlign:"right" }}>
                <span style={{ fontSize:12, color:"#94A3B8" }}>Updated {d.lastUpdated}</span>
                <div style={{ fontSize:10, color:"#CBD5E1", marginTop:1 }}>
                  {(() => {
                    try {
                      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                      const tzAbbr = new Date().toLocaleTimeString('en-US', { timeZoneName:'short' }).split(' ').pop();
                      const time = d.lastUpdatedTime || new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true });
                      return `${time} ${tzAbbr}`;
                    } catch(e) { return ''; }
                  })()}
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:6, background:"#F0FDF4",
                border:"1px solid #BBF7D0", padding:"4px 10px", borderRadius:6 }}>
                <div style={{ width:6, height:6, borderRadius:"50%", background:"#059669" }} />
                <span style={{ fontSize:12, fontWeight:600, color:"#166534" }}>
                  Phase {d.currentPhase+1}: {d.phases[d.currentPhase]}
                </span>
              </div>
            </div>
          </div>

          <div style={{ maxWidth:1100, margin:"0 auto", padding:"28px" }}>

            {/* ── OVERVIEW ── */}
            {tab==="overview" && <>

              {/* Phase bar */}
              <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10,
                padding:"16px 20px", marginBottom:20,
                display:"flex", alignItems:"center", gap:20 }}>
                <span style={{ fontSize:11, fontWeight:600, color:"#64748B", whiteSpace:"nowrap" }}>PROJECT PHASE</span>
                <div style={{ display:"flex", flex:1, gap:8 }}>
                  {d.phases.map((p,i)=>(
                    <div key={p} style={{ flex:1 }}>
                      <div style={{ height:5, borderRadius:3,
                        background: i<=d.currentPhase ? BRAND : "#E2E8F0",
                        opacity: i<d.currentPhase?0.4:1 }} />
                      <div style={{ fontSize:11, marginTop:5,
                        color:i===d.currentPhase ? BRAND : "#94A3B8",
                        fontWeight:i===d.currentPhase?600:400 }}>{p}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Stat cards — interactive */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:12, marginBottom:20 }}>
                {[
                  { label:"Total Tasks",  value:total,     color:"#1E293B", bg:"white",   border:"#E2E8F0", filter: null },
                  { label:"Done",         value:done,      color:"#059669", bg:"#F0FDF4", border:"#BBF7D0", filter: "done" },
                  { label:"In Progress",  value:inProg,    color:"#2563EB", bg:"#EFF6FF", border:"#BFDBFE", filter: "in-progress" },
                  { label:"Blocked",      value:blocked,   color:"#DC2626", bg:"#FEF2F2", border:"#FECACA", filter: "blocked" },
                  { label:"Overall",      value:`${pct}%`, color:"#7C3AED", bg:"#F5F3FF", border:"#DDD6FE", filter: "__helix__" },
                ].map(s=>(
                  <button key={s.label} onClick={() => {
                    if (s.filter === "__helix__") { setShowProgressModal(true); }
                    else { setTaskFilter(s.filter); setTab("tasks"); }
                  }} style={{ background:s.bg, border:`1px solid ${s.border}`,
                    borderRadius:10, padding:"16px 18px", cursor:"pointer",
                    fontFamily:"inherit", textAlign:"left",
                    transition:"transform .1s, box-shadow .15s",
                    outline:"none" }}
                    onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = `0 4px 12px ${s.color}18`; }}
                    onMouseLeave={e => { e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
                    <div style={{ fontSize:26, fontWeight:700, color:s.color, lineHeight:1 }}>{s.value}</div>
                    <div style={{ fontSize:11, color:"#94A3B8", marginTop:5, fontWeight:500, display:"flex", alignItems:"center", gap:4 }}>
                      {s.label}
                      <span style={{ fontSize:10, color: s.color, opacity:0.5 }}>→</span>
                    </div>
                  </button>
                ))}
              </div>

              {/* Discipline chips + tasks */}
              <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10,
                overflow:"hidden", marginBottom:16 }}>

                {/* Chips row */}
                <div style={{ padding:"10px 14px", display:"flex", gap:8, borderBottom:"1px solid #F1F5F9",
                  overflowX:"auto" }}>
                  {d.disciplines.map(disc => {
                    const dDone  = disc.tasks.filter(t => t.status === "done").length;
                    const dTotal = disc.tasks.length;
                    const dActive = dTotal - dDone;
                    const isSel  = sel === disc.id;
                    return (
                      <button key={disc.id} onClick={() => { setSel(disc.id); setShowDone(false); }}
                        style={{
                          display:"flex", alignItems:"center", gap:8,
                          padding:"7px 12px", borderRadius:8,
                          border: isSel ? `2px solid ${disc.color}` : "1px solid #E2E8F0",
                          background: isSel ? disc.lightColor : "white",
                          cursor:"pointer", fontFamily:"inherit",
                          transition:"all .15s", flexShrink:0 }}>
                        <div style={{ width:24, height:24, borderRadius:5,
                          background: isSel ? disc.color : disc.lightColor,
                          border: isSel ? "none" : `1px solid ${disc.borderColor}`,
                          display:"flex", alignItems:"center", justifyContent:"center",
                          fontSize:11, fontWeight:700,
                          color: isSel ? "white" : disc.color }}>
                          {disc.label[0]}
                        </div>
                        <div style={{ textAlign:"left" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                            <span style={{ fontSize:12, fontWeight:600,
                              color: isSel ? disc.color : "#374151" }}>{disc.label}</span>
                            {discHasNew(disc) && (
                              <span style={{ background:BRAND, color:"white", fontSize:8,
                                fontWeight:700, borderRadius:3, padding:"0px 4px",
                                letterSpacing:"0.06em", textTransform:"uppercase" }}>NEW</span>
                            )}
                          </div>
                          <div style={{ fontSize:10, color:"#94A3B8", marginTop:1 }}>
                            {dActive} active · {dDone}/{dTotal}
                          </div>
                        </div>
                        {/* Mini progress ring */}
                        <div style={{ width:28, height:28, position:"relative", flexShrink:0 }}>
                          <svg width="28" height="28" viewBox="0 0 28 28">
                            <circle cx="14" cy="14" r="11" fill="none" stroke="#E2E8F0" strokeWidth="2.5" />
                            <circle cx="14" cy="14" r="11" fill="none" stroke={disc.color} strokeWidth="2.5"
                              strokeDasharray={`${(dDone/dTotal)*69.12} 69.12`}
                              strokeLinecap="round"
                              transform="rotate(-90 14 14)"
                              style={{ transition:"stroke-dasharray .5s ease" }} />
                          </svg>
                          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center",
                            justifyContent:"center", fontSize:7, fontWeight:700, color: disc.color }}>
                            {Math.round((dDone/dTotal)*100)}%
                          </div>
                        </div>
                      </button>
                    );
                  })}
                </div>

                {/* Tasks for selected discipline — full TaskTable with all features */}
                {selected && (
                  <div>
                    {/* Header */}
                    <div style={{ padding:"10px 18px", background:selected.lightColor,
                      borderBottom:"1px solid #F1F5F9",
                      display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ width:22, height:22, borderRadius:5, background:"white",
                        border:`1px solid ${selected.borderColor}`,
                        display:"flex", alignItems:"center", justifyContent:"center",
                        fontSize:10, fontWeight:700, color:selected.color }}>{selected.label[0]}</div>
                      <span style={{ fontSize:12, fontWeight:600, color:"#0F172A" }}>{selected.label} Tasks</span>
                      <span style={{ fontSize:11, color:"#94A3B8" }}>
                        {selected.tasks.filter(t=>t.status!=="done").length} active · {selected.tasks.filter(t=>t.status==="done").length} done
                      </span>
                    </div>

                    {/* Active tasks — full TaskTable functionality */}
                    {(() => {
                      const activeTasks = selected.tasks.filter(t => t.status !== "done");
                      const doneTasks = selected.tasks.filter(t => t.status === "done");
                      return (
                        <>
                          {activeTasks.length > 0 && (
                            <TaskTable tasks={activeTasks} comments={comments} onCommentAdded={onCommentAdded} viewedAssets={viewedAssets} onAssetViewed={onAssetViewed} feedbackResponses={d.feedbackResponses || {}} />
                          )}
                          {activeTasks.length === 0 && (
                            <div style={{ padding:"16px 18px", fontSize:12, color:"#94A3B8", textAlign:"center" }}>
                              All tasks complete in this discipline
                            </div>
                          )}

                          {/* Collapsed done tasks */}
                          {doneTasks.length > 0 && (
                            <>
                              <button onClick={() => setShowDone(!showDone)}
                                style={{
                                  width:"100%", padding:"9px 18px", background:"#F8FAFC",
                                  border:"none", borderTop:"1px solid #E2E8F0",
                                  cursor:"pointer", fontFamily:"inherit", textAlign:"left",
                                  display:"flex", alignItems:"center", gap:8 }}>
                                <span style={{ fontSize:11, color:"#94A3B8" }}>{showDone ? "▾" : "▸"}</span>
                                <div style={{ width:7, height:7, borderRadius:"50%", background:"#059669", flexShrink:0 }} />
                                <span style={{ fontSize:12, fontWeight:500, color:"#64748B" }}>
                                  {doneTasks.length} completed task{doneTasks.length !== 1 ? "s" : ""}
                                </span>
                              </button>
                              {showDone && (
                                <TaskTable tasks={doneTasks} comments={comments} onCommentAdded={onCommentAdded} viewedAssets={viewedAssets} onAssetViewed={onAssetViewed} feedbackResponses={d.feedbackResponses || {}} />
                              )}
                            </>
                          )}
                        </>
                      );
                    })()}
                  </div>
                )}
              </div>

              {/* ── Two-column: Open Questions + Asset Library ── */}
              <div style={{ display:"grid", gridTemplateColumns: ((d.openQuestions || []).length > 0 && (d.assets || []).length > 0) ? "1fr 1fr" : "1fr", gap:16, marginTop:16 }}>

              {/* Open Questions — left column */}
              {d.openQuestions.length > 0 && (
                <div style={{ background:"#FFFBEB", border:"1px solid #FDE68A", borderRadius:10,
                  padding:"14px 18px", alignSelf:"start" }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
                    <span style={{ fontSize:13, fontWeight:700, color:"#92400E" }}>
                      ❓ {d.openQuestions.length} Open Question{d.openQuestions.length !== 1 ? "s" : ""}
                    </span>
                    <button onClick={() => setTab("questions")} style={{
                      background:BRAND, color:"white", border:"none", borderRadius:6,
                      padding:"4px 10px", fontSize:11, fontWeight:600,
                      cursor:"pointer", fontFamily:"inherit" }}>
                      Answer →
                    </button>
                  </div>
                  {d.openQuestions.map((q, i) => {
                    const u = URGENCY[q.urgency];
                    return (
                      <div key={q.id || i} style={{
                        display:"flex", alignItems:"flex-start", gap:8,
                        padding:"7px 0",
                        borderTop: i > 0 ? "1px solid #FDE68A" : "none" }}>
                        <Badge color={u.color} bg={u.bg}>{u.label}</Badge>
                        <span style={{ fontSize:12, color:"#78350F", lineHeight:1.5 }}>{q.q}</span>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Asset Library — right column */}
              {(d.assets || []).length > 0 && (
                <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10,
                  overflow:"hidden", alignSelf:"start" }}>
                  <div style={{ padding:"14px 18px", borderBottom:"1px solid #F1F5F9",
                    display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <span style={{ fontSize:13, fontWeight:600, color:"#0F172A" }}>Asset Library</span>
                      <span style={{ fontSize:11, color:"#94A3B8" }}>{d.assets.length} deliverable{d.assets.length !== 1 ? "s" : ""}</span>
                    </div>
                    <span style={{ fontSize:11, color:"#94A3B8" }}>Click to preview · expand for version history</span>
                  </div>

                  {d.assets.map(asset => {
                    const disc = d.disciplines.find(di => di.id === asset.discipline);
                    const as = ASSET_STATUS[asset.status] || ASSET_STATUS.draft;
                    const latestVersion = asset.versions[asset.versions.length - 1];
                    const isExpanded = assetLibExpanded === asset.id;
                    const latestUrl = latestVersion ? latestVersion.url : null;
                    const isNewAsset = latestUrl && !viewedAssets.has(latestUrl);

                    return (
                      <div key={asset.id} style={{ borderBottom:"1px solid #F1F5F9" }}>
                        {/* Asset card */}
                        <div style={{ padding:"14px 18px", display:"flex", alignItems:"center", gap:14 }}>
                          {/* Discipline icon */}
                          {disc && (
                            <div style={{ width:36, height:36, borderRadius:8,
                              background: disc.lightColor, border:`1px solid ${disc.borderColor}`,
                              display:"flex", alignItems:"center", justifyContent:"center",
                              fontSize:14, fontWeight:700, color: disc.color, flexShrink:0 }}>
                              {disc.label[0]}
                            </div>
                          )}

                          {/* Title + description */}
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                              <span style={{ fontSize:13, fontWeight:600, color:"#0F172A" }}>{asset.title}</span>
                              {isNewAsset && (
                                <span style={{ background:BRAND, color:"white", fontSize:9,
                                  fontWeight:700, borderRadius:3, padding:"1px 5px",
                                  letterSpacing:"0.06em", textTransform:"uppercase" }}>NEW</span>
                              )}
                              <Badge color={as.color} bg={as.bg}>{as.label}</Badge>
                            </div>
                            <div style={{ fontSize:12, color:"#64748B", marginTop:2 }}>{asset.description}</div>
                            {latestVersion && (
                              <div style={{ fontSize:11, color:"#94A3B8", marginTop:3 }}>
                                v{latestVersion.version} · {latestVersion.date}
                                {asset.versions.length > 1 && ` · ${asset.versions.length} versions`}
                              </div>
                            )}
                          </div>

                          {/* Action buttons */}
                          <div style={{ display:"flex", gap:8, flexShrink:0 }}>
                            {asset.versions.length > 0 && (
                              <button onClick={() => setAssetLibExpanded(isExpanded ? null : asset.id)} style={{
                                background:"none", border:"1px solid #E2E8F0", borderRadius:6,
                                padding:"6px 12px", fontSize:11, color:"#64748B", cursor:"pointer",
                                display:"flex", alignItems:"center", gap:4,
                                fontFamily:"inherit" }}>
                                {isExpanded ? "▾" : "▸"} {asset.versions.length === 1 ? "Details" : `${asset.versions.length} versions`}
                              </button>
                            )}
                            {latestUrl && (
                              <button onClick={() => { setAssetPreview({ url: latestUrl, title: asset.title }); onAssetViewed(latestUrl); }} style={{
                                background:BRAND, border:"none", borderRadius:6,
                                padding:"6px 14px", fontSize:11, color:"white", cursor:"pointer",
                                fontWeight:600, fontFamily:"inherit",
                                display:"flex", alignItems:"center", gap:5 }}>
                                View →
                              </button>
                            )}
                          </div>
                        </div>

                        {/* Expanded version history */}
                        {isExpanded && (
                          <div style={{ padding:"0 18px 14px 68px" }}>
                            {asset.versions.slice().reverse().map((v, vi) => {
                              const vs = ASSET_STATUS[v.status] || ASSET_STATUS.draft;
                              const isCurrent = vi === 0;
                              return (
                                <div key={v.version} style={{
                                  display:"flex", alignItems:"flex-start", gap:12,
                                  padding:"10px 0",
                                  borderTop: vi > 0 ? "1px solid #F1F5F9" : "none" }}>
                                  {/* Version timeline dot */}
                                  <div style={{ display:"flex", flexDirection:"column", alignItems:"center", flexShrink:0, paddingTop:2 }}>
                                    <div style={{ width:10, height:10, borderRadius:"50%",
                                      background: isCurrent ? vs.dot : "#E2E8F0",
                                      border: isCurrent ? "none" : "2px solid #E2E8F0" }} />
                                    {vi < asset.versions.length - 1 && (
                                      <div style={{ width:2, height:24, background:"#E2E8F0", marginTop:4 }} />
                                    )}
                                  </div>

                                  {/* Version content */}
                                  <div style={{ flex:1, minWidth:0 }}>
                                    <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                                      <span style={{ fontSize:12, fontWeight:600, color: isCurrent ? "#0F172A" : "#94A3B8" }}>
                                        v{v.version}
                                      </span>
                                      <span style={{ fontSize:11, color:"#94A3B8" }}>{v.date}</span>
                                      <Badge color={vs.color} bg={vs.bg}>{vs.label}</Badge>
                                      {isCurrent && (
                                        <span style={{ fontSize:10, color:BRAND, fontWeight:600 }}>LATEST</span>
                                      )}
                                    </div>
                                    {v.note && (
                                      <div style={{ fontSize:12, color:"#64748B", marginTop:4, lineHeight:1.5 }}>
                                        {v.note}
                                      </div>
                                    )}
                                  </div>

                                  {/* View this version */}
                                  {v.url && (
                                    <button onClick={() => { setAssetPreview({ url: v.url, title: `${asset.title} v${v.version}` }); onAssetViewed(v.url); }} style={{
                                      background:"none", border:`1px solid ${isCurrent ? BRAND : "#E2E8F0"}`,
                                      borderRadius:5, padding:"3px 10px", fontSize:11,
                                      color: isCurrent ? BRAND : "#94A3B8", cursor:"pointer",
                                      fontFamily:"inherit", flexShrink:0 }}>
                                      View →
                                    </button>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}

              </div>{/* close two-column grid */}

              {/* Asset Library preview modal */}
              {assetPreview && (
                <PreviewModal
                  url={assetPreview.url}
                  title={assetPreview.title}
                  onClose={() => setAssetPreview(null)}
                />
              )}

              {/* ── Asset Feedback (collapsible, filtered — only pending/deferred/no-status) ── */}
              {(() => {
                const fr = d.feedbackResponses || {};
                // Collect all asset/group feedback from comments, excluding "done" items
                const feedbackItems = [];
                Object.keys(comments).forEach(key => {
                  if (key.startsWith('task-asset:') || key.startsWith('task-group:')) {
                    const resp = fr[key];
                    // Skip items that are fully applied
                    if (resp && resp.status === 'done') return;

                    const isGroup = key.startsWith('task-group:');
                    const refId = isGroup ? key.replace('task-group:', '') : key.replace('task-asset:', '');
                    let disc = null;
                    let taskText = '';
                    d.disciplines.forEach(di => {
                      di.tasks.forEach(t => {
                        if (isGroup && t.groupId === refId) { disc = di; taskText = t.groupLabel || refId; }
                        if (!isGroup && String(t.id) === refId) { disc = di; taskText = t.text; }
                      });
                    });
                    comments[key].forEach(c => {
                      feedbackItems.push({ ...c, disc, taskText, isGroup, commentKey: key });
                    });
                  }
                });
                if (feedbackItems.length === 0) return null;

                // Group by discipline
                const byDisc = {};
                feedbackItems.forEach(f => {
                  const label = f.disc ? f.disc.label : 'General';
                  if (!byDisc[label]) byDisc[label] = { disc: f.disc, items: [] };
                  byDisc[label].items.push(f);
                });

                return (
                  <div style={{ background:"white", border:`1px solid #E2E8F0`,
                    borderRadius:10, marginTop:16, overflow:"hidden" }}>
                    {/* Collapsible header */}
                    <button onClick={() => setAssetFeedbackOpen(!assetFeedbackOpen)} style={{
                      width:"100%", padding:"14px 20px", background:"white", border:"none",
                      cursor:"pointer", fontFamily:"inherit", textAlign:"left",
                      display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <span style={{ fontSize:12, color:"#64748B" }}>{assetFeedbackOpen ? "▾" : "▸"}</span>
                        <span style={{ fontSize:13, fontWeight:600, color:"#64748B" }}>
                          🎨 Pending Feedback
                        </span>
                        <span style={{ fontSize:11, color:"#94A3B8" }}>
                          {feedbackItems.length} item{feedbackItems.length !== 1 ? 's' : ''} awaiting update
                        </span>
                      </div>
                      <div style={{ display:"flex", gap:6 }}>
                        {Object.entries(byDisc).map(([label, { disc }]) => (
                          disc && <div key={label} style={{ width:18, height:18, borderRadius:4,
                            background:disc.lightColor, border:`1px solid ${disc.borderColor}`,
                            display:"flex", alignItems:"center", justifyContent:"center",
                            fontSize:9, fontWeight:700, color:disc.color }}>{disc.label[0]}</div>
                        ))}
                      </div>
                    </button>

                    {/* Expanded content */}
                    {assetFeedbackOpen && (
                      <div style={{ padding:"0 20px 16px", borderTop:"1px solid #F1F5F9" }}>
                        {Object.entries(byDisc).map(([label, { disc, items }]) => (
                          <div key={label} style={{ marginTop:12 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                              {disc && (
                                <div style={{ width:20, height:20, borderRadius:4,
                                  background:disc.lightColor, border:`1px solid ${disc.borderColor}`,
                                  display:"flex", alignItems:"center", justifyContent:"center",
                                  fontSize:10, fontWeight:700, color:disc.color }}>{disc.label[0]}</div>
                              )}
                              <span style={{ fontSize:12, fontWeight:600, color: disc ? disc.color : "#64748B" }}>{label}</span>
                            </div>
                            {items.map((f, fi) => {
                              const resp = fr[f.commentKey];
                              const fs = resp ? FEEDBACK_STATUS[resp.status] : null;
                              return (
                                <div key={fi} style={{
                                  padding:"8px 12px", marginBottom:4, marginLeft:28,
                                  background:"#F8FAFC", borderRadius:6,
                                  borderLeft:`2px solid ${disc ? disc.color : BRAND}` }}>
                                  <div style={{ fontSize:12, color:"#1E293B", lineHeight:1.5 }}>"{f.body}"</div>
                                  <div style={{ fontSize:11, color:"#94A3B8", marginTop:4, display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                                    <span>
                                      <strong style={{ color:"#374151" }}>{f.commenter_name}</strong>
                                      , {formatDate(f.created_at)}
                                      {f.taskText && <span> · on <em>{f.taskText}</em></span>}
                                    </span>
                                    {fs && (
                                      <span style={{ fontSize:10, fontWeight:600, color: fs.color,
                                        background: fs.bg, padding:"1px 6px", borderRadius:3 }}>
                                        {fs.icon} {fs.label}
                                      </span>
                                    )}
                                  </div>
                                  {resp && resp.note && (
                                    <div style={{ fontSize:11, color:"#64748B", marginTop:6, padding:"6px 8px",
                                      background:"white", borderRadius:4, border:"1px solid #E2E8F0", lineHeight:1.5 }}>
                                      <strong style={{ color:"#374151" }}>Response:</strong> {resp.note}
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })()}
            </>}

            {/* ── TASKS ── */}
            {tab==="tasks" && (() => {
              // Compute filtered tasks per discipline
              const filterLabel = taskFilter ? STATUS[taskFilter]?.label || "All" : "All";
              const allFilteredTasks = taskFilter
                ? d.disciplines.flatMap(disc => disc.tasks.filter(t => t.status === taskFilter))
                : null;

              return (
              <div>
                {/* Filter bar */}
                {taskFilter && (
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14,
                    padding:"10px 16px", background:"white", border:"1px solid #E2E8F0",
                    borderRadius:10 }}>
                    <span style={{ fontSize:12, color:"#64748B" }}>Filtered to:</span>
                    <Badge color={STATUS[taskFilter].badgeText} bg={STATUS[taskFilter].badge}>{filterLabel}</Badge>
                    <span style={{ fontSize:12, color:"#94A3B8" }}>
                      {allFilteredTasks.length} task{allFilteredTasks.length !== 1 ? "s" : ""} across all disciplines
                    </span>
                    <button onClick={() => setTaskFilter(null)} style={{
                      marginLeft:"auto", background:"none", border:"1px solid #E2E8F0",
                      borderRadius:6, padding:"4px 10px", fontSize:11, color:"#64748B",
                      cursor:"pointer", fontFamily:"inherit" }}>
                      Clear filter ✕
                    </button>
                  </div>
                )}

                <div style={{ display:"grid", gridTemplateColumns:"200px 1fr", gap:16 }}>
                <div style={{ background:"white", border:"1px solid #E2E8F0",
                  borderRadius:10, overflow:"hidden", alignSelf:"start" }}>
                  {d.disciplines.map(disc=>{
                    const dDone = disc.tasks.filter(t=>t.status==="done").length;
                    const filteredCount = taskFilter
                      ? disc.tasks.filter(t => t.status === taskFilter).length
                      : disc.tasks.length;
                    return (
                      <div key={disc.id} onClick={()=>setSel(disc.id)} style={{
                        padding:"10px 14px", cursor:"pointer",
                        display:"flex", justifyContent:"space-between", alignItems:"center",
                        background:sel===disc.id?disc.lightColor:"white",
                        borderLeft:`3px solid ${sel===disc.id?disc.color:"transparent"}`,
                        borderBottom:"1px solid #F1F5F9",
                        opacity: taskFilter && filteredCount === 0 ? 0.4 : 1 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                          <span style={{ fontSize:13, fontWeight:sel===disc.id?600:400,
                            color:sel===disc.id?disc.color:"#374151" }}>{disc.label}</span>
                          {discHasNew(disc) && (
                            <span style={{ background:BRAND, color:"white", fontSize:9,
                              fontWeight:700, borderRadius:3, padding:"1px 5px",
                              letterSpacing:"0.06em", textTransform:"uppercase" }}>NEW</span>
                          )}
                        </div>
                        <span style={{ fontSize:11, color:"#94A3B8" }}>
                          {taskFilter ? filteredCount : `${dDone}/${disc.tasks.length}`}
                        </span>
                      </div>
                    );
                  })}
                </div>
                {selected && (
                  <div style={{ background:"white", border:"1px solid #E2E8F0",
                    borderRadius:10, overflow:"hidden" }}>
                    <div style={{ padding:"14px 18px", borderBottom:"1px solid #F1F5F9",
                      background:selected.lightColor, display:"flex", alignItems:"center", gap:8 }}>
                      <span style={{ fontSize:14, fontWeight:600, color:"#0F172A" }}>{selected.label}</span>
                      {taskFilter && (
                        <Badge color={STATUS[taskFilter].badgeText} bg={STATUS[taskFilter].badge}>{filterLabel}</Badge>
                      )}
                    </div>
                    <TaskTable
                      tasks={taskFilter ? selected.tasks.filter(t => t.status === taskFilter) : selected.tasks}
                      comments={comments} onCommentAdded={onCommentAdded}
                      viewedAssets={viewedAssets} onAssetViewed={onAssetViewed}
                      feedbackResponses={d.feedbackResponses || {}} />
                    {taskFilter && selected.tasks.filter(t => t.status === taskFilter).length === 0 && (
                      <div style={{ padding:"24px 18px", textAlign:"center", fontSize:12, color:"#94A3B8" }}>
                        No {filterLabel.toLowerCase()} tasks in {selected.label}
                      </div>
                    )}
                  </div>
                )}
              </div>
              </div>
              );
            })()}

            {/* ── DECISIONS ── */}
            {tab==="decisions" && (
              <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10, overflow:"hidden" }}>
                <div style={{ padding:"14px 18px", borderBottom:"1px solid #F1F5F9" }}>
                  <span style={{ fontSize:13, fontWeight:600, color:"#0F172A" }}>Decision Log</span>
                  <span style={{ fontSize:12, color:"#94A3B8", marginLeft:8 }}>{d.decisions.length} recorded</span>
                </div>
                {d.decisions.map((dec, i) => (
                  <DecisionRow key={i} dec={dec} index={i} comments={comments} onCommentAdded={onCommentAdded} />
                ))}
                <div style={{ padding:"12px 18px", background:"#F8FAFC",
                  borderTop:"1px solid #E2E8F0", fontSize:12, color:"#94A3B8" }}>
                  💡 After each Cowork session, new decisions will be automatically logged here.
                </div>
              </div>
            )}

            {/* ── WEEKLY UPDATES — Executive Week-over-Week ── */}
            {tab==="updates" && (() => {
              const weeks = d.weeklyUpdates || [];
              const latest = weeks[weeks.length - 1];
              const prev   = weeks.length > 1 ? weeks[weeks.length - 2] : null;

              function Delta({ value, suffix = "", invert = false }) {
                if (value === 0 || value === null || value === undefined) return <span style={{ fontSize:12, color:"#94A3B8" }}>—</span>;
                const positive = invert ? value < 0 : value > 0;
                const color = positive ? "#059669" : value === 0 ? "#94A3B8" : "#DC2626";
                const arrow = value > 0 ? "↑" : "↓";
                return (
                  <span style={{ fontSize:12, fontWeight:600, color }}>
                    {arrow} {Math.abs(value)}{suffix}
                  </span>
                );
              }

              if (weeks.length === 0) return (
                <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10, padding:"48px 24px", textAlign:"center" }}>
                  <div style={{ fontSize:32, marginBottom:10 }}>📊</div>
                  <div style={{ fontSize:13, fontWeight:500, color:"#64748B", marginBottom:6 }}>First snapshot posts this Friday</div>
                  <div style={{ fontSize:12, color:"#94A3B8" }}>Week-over-week progress will appear here automatically.</div>
                </div>
              );

              const doneDelta     = prev ? latest.done - prev.done : null;
              const pctDelta      = prev ? latest.pct - prev.pct : null;
              const blockerDelta  = prev ? latest.blockers - prev.blockers : null;
              const velocity      = latest.done; // tasks completed this week alone (cumulative done minus prev)
              const weeklyDone    = prev ? latest.done - prev.done : latest.done;

              return (
                <div>
                  {/* ── Header ── */}
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                    <div>
                      <span style={{ fontSize:15, fontWeight:700, color:"#0F172A" }}>Week {latest.week}</span>
                      <span style={{ fontSize:13, color:"#94A3B8", marginLeft:10 }}>{latest.dateRange}</span>
                    </div>
                    <span style={{ fontSize:11, color:"#94A3B8" }}>Updated every Friday</span>
                  </div>

                  {/* ── Velocity cards — current + delta ── */}
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:12, marginBottom:20 }}>
                    {[
                      { label:"Overall Progress", value:`${latest.pct}%`, delta: pctDelta, suffix:"%", color:BRAND, bg:"#EFF6FF", border:"#BFDBFE" },
                      { label:"Tasks Completed", value:latest.done, delta: doneDelta, suffix:"", color:"#059669", bg:"#F0FDF4", border:"#BBF7D0" },
                      { label:"This Week", value:`+${weeklyDone}`, delta: null, suffix:"", color:"#7C3AED", bg:"#F5F3FF", border:"#DDD6FE" },
                      { label:"Blockers", value:latest.blockers, delta: blockerDelta, suffix:"", color: latest.blockers > 0 ? "#DC2626" : "#059669", bg: latest.blockers > 0 ? "#FEF2F2" : "#F0FDF4", border: latest.blockers > 0 ? "#FECACA" : "#BBF7D0", invert: true },
                    ].map(card => (
                      <div key={card.label} style={{ background:card.bg, border:`1px solid ${card.border}`, borderRadius:10, padding:"16px 18px" }}>
                        <div style={{ fontSize:24, fontWeight:700, color:card.color, lineHeight:1 }}>{card.value}</div>
                        <div style={{ fontSize:11, color:"#94A3B8", marginTop:6, fontWeight:500 }}>{card.label}</div>
                        {card.delta !== null && prev && (
                          <div style={{ marginTop:6 }}>
                            <Delta value={card.delta} suffix={card.suffix} invert={card.invert} />
                            <span style={{ fontSize:11, color:"#94A3B8", marginLeft:4 }}>vs last week</span>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>

                  {/* ── Progress bar — full width ── */}
                  <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10, padding:"16px 20px", marginBottom:20 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                      <span style={{ fontSize:12, fontWeight:600, color:"#0F172A" }}>Engagement Progress</span>
                      <span style={{ fontSize:12, fontWeight:600, color:BRAND }}>{latest.pct}%</span>
                    </div>
                    <div style={{ height:8, background:"#E2E8F0", borderRadius:4, overflow:"hidden", position:"relative" }}>
                      {prev && (
                        <div style={{ position:"absolute", width:`${prev.pct}%`, height:"100%", background:BRAND, opacity:0.2, borderRadius:4 }} />
                      )}
                      <div style={{ position:"relative", width:`${latest.pct}%`, height:"100%", background:BRAND, borderRadius:4, transition:"width .6s ease" }} />
                    </div>
                    {prev && (
                      <div style={{ display:"flex", gap:16, marginTop:8 }}>
                        <span style={{ fontSize:11, color:"#94A3B8" }}>
                          <span style={{ display:"inline-block", width:8, height:8, borderRadius:2, background:BRAND, opacity:0.2, marginRight:4, verticalAlign:"middle" }} />
                          Last week: {prev.pct}%
                        </span>
                        <span style={{ fontSize:11, color:"#94A3B8" }}>
                          <span style={{ display:"inline-block", width:8, height:8, borderRadius:2, background:BRAND, marginRight:4, verticalAlign:"middle" }} />
                          This week: {latest.pct}%
                        </span>
                      </div>
                    )}
                  </div>

                  {/* ── Week-over-week timeline ── */}
                  <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10, overflow:"hidden", marginBottom:20 }}>
                    <div style={{ padding:"14px 18px", borderBottom:"1px solid #F1F5F9" }}>
                      <span style={{ fontSize:13, fontWeight:600, color:"#0F172A" }}>Week-over-Week</span>
                      <span style={{ fontSize:12, color:"#94A3B8", marginLeft:8 }}>{weeks.length} weeks tracked</span>
                    </div>
                    <table style={{ width:"100%" }}>
                      <thead>
                        <tr style={{ background:"#F8FAFC" }}>
                          {["Week","Date Range","Progress","Done","Blockers","Velocity",""].map(h => (
                            <th key={h} style={{ padding:"9px 16px", textAlign:"left", fontSize:11,
                              fontWeight:600, color:"#94A3B8", textTransform:"uppercase",
                              letterSpacing:"0.06em", borderBottom:"1px solid #E2E8F0" }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {weeks.map((w, idx) => {
                          const pw = idx > 0 ? weeks[idx - 1] : null;
                          const wkDone = pw ? w.done - pw.done : w.done;
                          const wkPct  = pw ? w.pct - pw.pct : w.pct;
                          const wkBlock = pw ? w.blockers - pw.blockers : null;
                          const isLatest = idx === weeks.length - 1;
                          return (
                            <tr key={w.week} style={{ background: isLatest ? "#FAFBFF" : "white" }}>
                              <td style={{ padding:"12px 16px", borderBottom:"1px solid #F1F5F9" }}>
                                <span style={{ fontSize:13, fontWeight:isLatest ? 700 : 500, color:"#0F172A" }}>
                                  Week {w.week}
                                </span>
                                {isLatest && <span style={{ fontSize:9, fontWeight:700, color:BRAND, marginLeft:6, textTransform:"uppercase", letterSpacing:"0.06em" }}>Current</span>}
                              </td>
                              <td style={{ padding:"12px 16px", borderBottom:"1px solid #F1F5F9", fontSize:12, color:"#64748B" }}>{w.dateRange}</td>
                              <td style={{ padding:"12px 16px", borderBottom:"1px solid #F1F5F9" }}>
                                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                                  <div style={{ width:48, height:4, background:"#E2E8F0", borderRadius:2, overflow:"hidden" }}>
                                    <div style={{ width:`${w.pct}%`, height:"100%", background:BRAND, borderRadius:2 }} />
                                  </div>
                                  <span style={{ fontSize:12, fontWeight:600, color:BRAND }}>{w.pct}%</span>
                                  {pw && <Delta value={wkPct} suffix="%" />}
                                </div>
                              </td>
                              <td style={{ padding:"12px 16px", borderBottom:"1px solid #F1F5F9" }}>
                                <span style={{ fontSize:13, fontWeight:600, color:"#0F172A" }}>{w.done}</span>
                                {pw && <span style={{ marginLeft:6 }}><Delta value={wkDone} /></span>}
                              </td>
                              <td style={{ padding:"12px 16px", borderBottom:"1px solid #F1F5F9" }}>
                                {w.blockers > 0
                                  ? <Badge color="#DC2626" bg="#FEE2E2">{w.blockers}</Badge>
                                  : <span style={{ fontSize:12, color:"#059669", fontWeight:600 }}>0</span>}
                                {wkBlock !== null && wkBlock !== 0 && <span style={{ marginLeft:6 }}><Delta value={wkBlock} invert={true} /></span>}
                              </td>
                              <td style={{ padding:"12px 16px", borderBottom:"1px solid #F1F5F9" }}>
                                <span style={{ fontSize:13, fontWeight:600, color:"#7C3AED" }}>+{wkDone}</span>
                                <span style={{ fontSize:11, color:"#94A3B8", marginLeft:4 }}>tasks</span>
                              </td>
                              <td style={{ padding:"12px 16px", borderBottom:"1px solid #F1F5F9" }}>
                                {w.snapshotUrl && (
                                  <button onClick={() => { setPreviewUrl(w.snapshotUrl); setPreviewTitle(`Week ${w.week} Report — ${w.dateRange}`); }} style={{
                                    background:"none", border:"none", fontSize:11, color:BRAND,
                                    textDecoration:"none", fontWeight:500, cursor:"pointer",
                                    fontFamily:"inherit", padding:0 }}>
                                    View report →
                                  </button>
                                )}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>

                  {/* ── Latest week highlights ── */}
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
                    {/* Wins */}
                    <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10, overflow:"hidden" }}>
                      <div style={{ padding:"14px 18px", borderBottom:"1px solid #F1F5F9", display:"flex", alignItems:"center", gap:8 }}>
                        <div style={{ width:6, height:6, borderRadius:"50%", background:"#059669" }} />
                        <span style={{ fontSize:13, fontWeight:600, color:"#0F172A" }}>Key Wins — Week {latest.week}</span>
                      </div>
                      <div style={{ padding:"14px 18px" }}>
                        {(latest.wins || []).slice(0, 4).map((win, wi) => (
                          <div key={wi} style={{ fontSize:12, color:"#1E293B", marginBottom:8, display:"flex", gap:8, lineHeight:1.5 }}>
                            <span style={{ color:"#059669", flexShrink:0, fontWeight:600 }}>✓</span>
                            <span>{win}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Next up */}
                    <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10, overflow:"hidden" }}>
                      <div style={{ padding:"14px 18px", borderBottom:"1px solid #F1F5F9", display:"flex", alignItems:"center", gap:8 }}>
                        <div style={{ width:6, height:6, borderRadius:"50%", background:BRAND }} />
                        <span style={{ fontSize:13, fontWeight:600, color:"#0F172A" }}>Up Next — Week {latest.week + 1}</span>
                      </div>
                      <div style={{ padding:"14px 18px" }}>
                        {(latest.nextUp || []).map((next, ni) => (
                          <div key={ni} style={{ fontSize:12, color:"#64748B", marginBottom:8, display:"flex", gap:8, lineHeight:1.5 }}>
                            <span style={{ color:BRAND, flexShrink:0, fontWeight:600 }}>→</span>
                            <span>{next}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* ── OPEN QUESTIONS ── */}
            {tab==="questions" && (
              <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:10, overflow:"hidden" }}>
                <div style={{ padding:"14px 18px", borderBottom:"1px solid #F1F5F9" }}>
                  <span style={{ fontSize:13, fontWeight:600, color:"#0F172A" }}>Open Questions</span>
                  <span style={{ fontSize:12, color:"#94A3B8", marginLeft:8 }}>
                    {d.openQuestions.length} need answers
                  </span>
                </div>
                {d.openQuestions.map((item, i) => (
                  <QuestionRow key={item.id || i} item={item} index={i} comments={comments} onCommentAdded={onCommentAdded} />
                ))}
              </div>
            )}

          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
