            </tr>
          </thead>
          <tbody>
            {(() => {
              // Pre-process: collect groups so we can render them as clusters
              const rendered = new Set();
              const rows = [];

              tasks.forEach((t, idx) => {
                if (rendered.has(t.id)) return;

                // ── Grouped tasks: render as a connected cluster ──
                if (t.groupId) {
                  const group = tasks.filter(g => g.groupId === t.groupId);
                  group.forEach(g => rendered.add(g.id));
                  const groupAsset = group.find(g => g.groupAsset)?.groupAsset;
                  const groupLabel = group.find(g => g.groupLabel)?.groupLabel || "Shared deliverable";

                  // Collect all comments for tasks in this group + group-level comments
                  // Group comments stored as item_type='task', item_id='group:<groupId>' to satisfy DB constraint
                  const groupComments = comments[`task-group:${t.groupId}`] || [];
                  const allTaskComments = {};
                  group.forEach(g => { allTaskComments[g.id] = comments[`task-${g.id}`] || []; });
                  const isGroupPanelOpen = openPanel === `group-${t.groupId}`;

                  rows.push(
                    <React.Fragment key={`group-${t.groupId}`}>
                      <tr>
                        <td colSpan={3} style={{ padding:0, borderBottom:"1px solid #F1F5F9" }}>
                          <div style={{ borderLeft:`3px solid ${BRAND}`, margin:"0 12px", padding:"14px 12px" }}>
                            {/* Group label */}
                            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                              <span style={{ fontSize:10, fontWeight:700, color:BRAND,
                                textTransform:"uppercase", letterSpacing:"0.08em" }}>
                                {groupLabel}
                              </span>
                              <span style={{ fontSize:10, color:"#94A3B8" }}>
                                {group.length} tasks delivered together
                              </span>
                            </div>

                            {/* Stacked task items — each with hover note */}
                            {group.map((g, gi) => {
                              const gs = STATUS[g.status]; const gp = PRIORITY[g.priority];
                              const taskNotes = allTaskComments[g.id] || [];
                              const isTaskPanelOpen = openPanel === g.id;
                              return (
                                <div key={g.id}>
                                  <div
                                    onMouseEnter={() => setHoveredTask(g.id)}
                                    onMouseLeave={() => setHoveredTask(null)}
                                    style={{
                                      display:"flex", alignItems:"center", justifyContent:"space-between",
                                      padding:"6px 0",
                                      borderTop: gi > 0 ? "1px solid #F1F5F9" : "none",
                                      background: hoveredTask === g.id ? "#FAFBFF" : "transparent",
                                      borderRadius:4, margin:"0 -4px", padding:"6px 4px" }}>
                                    <div style={{ display:"flex", alignItems:"center", gap:8, flex:1 }}>
                                      <span style={{ display:"inline-block", width:7, height:7, borderRadius:"50%",
                                        background:gs.dot, flexShrink:0 }} />
                                      <span style={{ fontSize:13,
                                        color: g.status==="done" ? "#94A3B8" : "#1E293B",
                                        textDecoration: g.status==="done" ? "line-through" : "none",
                                        lineHeight:1.5 }}>
                                        {g.text}
                                      </span>
                                    </div>
                                    <div style={{ display:"flex", gap:6, flexShrink:0, marginLeft:12, alignItems:"center" }}>
                                      {hoveredTask === g.id && !isTaskPanelOpen && (
                                        <button onClick={() => openComment(g.id)} style={{
                                          background:"none", border:"1px solid #E2E8F0", borderRadius:4,
                                          padding:"2px 8px", fontSize:11, color:"#64748B", cursor:"pointer",
                                          display:"flex", alignItems:"center", gap:4, whiteSpace:"nowrap",
                                          fontFamily:"inherit" }}>
                                          💬 Note

                                      <Badge color={gp.color} bg={gp.bg}>{gp.label}</Badge>
                                      <Badge color={gs.badgeText} bg={gs.badge}>{gs.label}</Badge>

                                    <div style={{ padding:"8px 0 8px 15px" }}>
                                      <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:8, padding:"12px 14px" }}>
                                        <div style={{ fontSize:12, color:"#64748B", marginBottom:10 }}>

                                        <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", gap:"8px 12px", alignItems:"center" }}>

                                            borderRadius:6, outline:"none", fontFamily:"inherit",

                                          <button onClick={closePanel} style={{ fontSize:12, padding:"6px 14px",

                                            color:"#64748B", cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>

                                          💬 <strong style={{ color:"#374151", fontWeight:600 }}>{c.commenter_name}</strong>

                                        <div style={{ fontSize:12, color:"#1E293B", marginTop:2, lineHeight:1.5, paddingLeft:18 }}>
                                          {c.body}
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                )}
                                </>
                              );
                            })()}

                            {/* Group-level comment panel */}
                            {isGroupPanelOpen && (
                              <div style={{ marginTop:10 }}>
                                <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:8, padding:"12px 14px" }}>
                                  <div style={{ fontSize:12, color:"#64748B", marginBottom:10 }}>
                                    Note on deliverable: <strong style={{ color:"#374151" }}>"{groupLabel}"</strong>
                                  </div>
                                  <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", gap:"8px 12px", alignItems:"center" }}>
                                    <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Your name</label>
                                    <input value={panelName} onChange={e => setPanelName(e.target.value)}
                                      placeholder="e.g. Hayden" style={{ fontSize:13, padding:"6px 10px",
                                      border:"1px solid #E2E8F0", borderRadius:6, outline:"none",
                                      fontFamily:"inherit", color:"#1E293B" }} />
                                    <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Note</label>
                                    <textarea value={panelBody} onChange={e => setPanelBody(e.target.value)}
                                      placeholder="Overall feedback on this deliverable..." rows={2}
                                      style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                                      borderRadius:6, outline:"none", fontFamily:"inherit",
                                      resize:"vertical", color:"#1E293B" }} />
                                  </div>
                                  {panelError && <div style={{ fontSize:12, color:"#DC2626", marginTop:8 }}>⚠ {panelError}</div>}
                                  <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:10 }}>
                                    <button onClick={closePanel} style={{ fontSize:12, padding:"6px 14px",
                                      border:"1px solid #E2E8F0", borderRadius:6, background:"white",
                                      color:"#64748B", cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
                                    <button onClick={() => {
                                      setPanelLoading(true); setPanelError('');
                                      fetch(`${window.SUPABASE_URL}/rest/v1/comments`, {
                                        method: 'POST',
                                        headers: {
                                          'apikey': window.SUPABASE_ANON_KEY,
                                          'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
                                          'Content-Type': 'application/json',
                                          'Prefer': 'return=representation',
                                        },
                                        body: JSON.stringify({
                                          project_slug: window.PROJECT_SLUG,
                                          item_type: 'task',
                                          item_id: `group:${t.groupId}`,
                                          item_text: groupLabel,
                                          commenter_name: panelName.trim(),
                                          body: panelBody.trim(),
                                        }),
                                      })
                                      .then(res => { if (!res.ok) throw new Error(`Error ${res.status}`); return res.json(); })
                                      .then(([newComment]) => { onCommentAdded(newComment); closePanel(); })
                                      .catch(() => { setPanelError('Something went wrong — please try again.'); })
                                      .finally(() => setPanelLoading(false));
                                    }} disabled={!canSend} style={{
                                      fontSize:12, padding:"6px 14px", border:"none", borderRadius:6,
                                      fontFamily:"inherit", fontWeight:600,
                                      cursor: canSend ? "pointer" : "not-allowed",
                                      background: canSend ? BRAND : "#E2E8F0",
                                      color: canSend ? "white" : "#94A3B8" }}>
                                      {panelLoading ? 'Sending...' : 'Send →'}
                                    </button>
                                  </div>
                                </div>
                              </div>
                            )}
                          </div>
                        </td>
                      </tr>
                    </React.Fragment>
                  );
                  return;
                }

                // ── Regular (ungrouped) task ──
                rendered.add(t.id);
                const s = STATUS[t.status]; const p = PRIORITY[t.priority];
                const taskComments  = comments[`task-${t.id}`] || [];
                const assetKey = t.assetPath ? `task-asset:${t.id}` : null;
                const assetComments = assetKey ? (comments[assetKey] || []) : [];
                const isPanelOpen   = openPanel === t.id;
                const isAssetPanelOpen = openPanel === `asset-${t.id}`;
                const totalCommentCount = taskComments.length + assetComments.length;
                const commentSectionKey = assetKey || `task-${t.id}`;
                const isCommentsExpanded = expandedComments.has(commentSectionKey);
                const assetResp = assetKey ? feedbackResponses[assetKey] : null;
                const assetFs = assetResp ? FEEDBACK_STATUS[assetResp.status] : null;
                const hasBelowContent = isCommentsExpanded || isPanelOpen || isAssetPanelOpen;

                rows.push(
                  <React.Fragment key={t.id}>
                    <tr
                      onMouseEnter={() => setHoveredTask(t.id)}
                      onMouseLeave={() => setHoveredTask(null)}
                      style={{ background: hoveredTask === t.id ? '#FAFBFF' : 'white' }}
                    >
                      <td style={{ padding:"11px 16px", borderBottom: hasBelowContent ? "none" : "1px solid #F1F5F9" }}>
                        <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
                          <div style={{ display:"flex", alignItems:"flex-start", gap:9, flex:1 }}>
                            <span style={{ display:"inline-block", width:7, height:7, borderRadius:"50%",
                              background:s.dot, marginTop:4, flexShrink:0 }} />
                            <div>
                              <div style={{ fontSize:13, color:t.status==="done"?"#94A3B8":"#1E293B",
                                textDecoration:t.status==="done"?"line-through":"none", lineHeight:1.5 }}>
                                {t.text}
                              </div>
                              {t.assetPath && (
                                <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:5, flexWrap:"wrap" }}>
                                  <button onClick={() => openAsset(t.assetPath)} style={{
                                    background:"none", border:`1px solid ${BRAND}`,
                                    borderRadius:5, padding:"2px 9px", fontSize:11, color:BRAND,
                                    cursor:"pointer", fontFamily:"inherit",
                                    display:"inline-flex", alignItems:"center", gap:5,
                                    textDecoration:"none" }}>
                                    {!viewedAssets.has(t.assetPath) && (
                                      <span style={{ background:BRAND, color:"white", fontSize:9,
                                        fontWeight:700, borderRadius:3, padding:"1px 5px",
                                        letterSpacing:"0.06em", textTransform:"uppercase" }}>NEW</span>
                                    )}
                                    View asset →
                                  </button>
                                  {!isAssetPanelOpen && (
                                    <button onClick={() => openComment(`asset-${t.id}`)} style={{
                                      background:"none", border:"1px solid #E2E8F0", borderRadius:5,
                                      padding:"2px 9px", fontSize:11, color:"#64748B", cursor:"pointer",
                                      display:"inline-flex", alignItems:"center", gap:5,
                                      fontFamily:"inherit" }}>
                                      💬 Feedback
                                    </button>
                                  )}
                                  {/* Collapsible feedback toggle */}
                                  {totalCommentCount > 0 && (
                                    <button onClick={() => toggleCommentSection(commentSectionKey)} style={{
                                      background: isCommentsExpanded ? "#F1F5F9" : "none",
                                      border:"1px solid #E2E8F0", borderRadius:5,
                                      padding:"2px 9px", fontSize:11, color:"#64748B", cursor:"pointer",
                                      display:"inline-flex", alignItems:"center", gap:5,
                                      fontFamily:"inherit" }}>
                                      {isCommentsExpanded ? "▾" : "▸"} {totalCommentCount} comment{totalCommentCount !== 1 ? "s" : ""}
                                      {assetFs && (
                                        <span style={{ fontSize:10, fontWeight:600, color: assetFs.color,
                                          background: assetFs.bg, padding:"1px 6px", borderRadius:3, marginLeft:2 }}>
                                          {assetFs.icon} {assetFs.label}
                                        </span>
                                      )}
                                    </button>
                                  )}
                                  {totalCommentCount === 0 && assetFs && (
                                    <span style={{ fontSize:10, fontWeight:600, color: assetFs.color,
                                      background: assetFs.bg, padding:"2px 8px", borderRadius:4,

                                  )}
                                </div>

                            </div>
                          </div>
                          {hoveredTask === t.id && !isPanelOpen && !t.assetPath && (

                      </td>
                      <td style={{ padding:"11px 16px", borderBottom: hasBelowContent ? "none" : "1px solid #F1F5F9", whiteSpace:"nowrap" }}>

                      <td style={{ padding:"11px 16px", borderBottom: hasBelowContent ? "none" : "1px solid #F1F5F9", whiteSpace:"nowrap" }}>
                        <Badge color={s.badgeText} bg={s.badge}>{s.label}</Badge>

                    </tr>

                    {isPanelOpen && (
                      <tr>
                        <td colSpan={3} style={{
                          padding:"0 16px 12px 44px",

                          <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:8, padding:"14px 16px" }}>
                            <div style={{ fontSize:12, color:"#64748B", marginBottom:12 }}>
                              Leave a note on: <strong style={{ color:"#374151" }}>"{t.text}"</strong>
                            </div>
                            <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", gap:"8px 12px", alignItems:"center" }}>

                                border:"1px solid #E2E8F0", borderRadius:6, outline:"none",
                                fontFamily:"inherit", color:"#1E293B" }} />
                              <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Note</label>
                              <textarea value={panelBody} onChange={e => setPanelBody(e.target.value)}
                                placeholder="Type your note here..." rows={2}
                                style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                                borderRadius:6, outline:"none", fontFamily:"inherit",
                                resize:"vertical", color:"#1E293B" }} />
                            </div>
                            {panelError && <div style={{ fontSize:12, color:"#DC2626", marginTop:8 }}>⚠ {panelError}</div>}
                            <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:10 }}>
                              <button onClick={closePanel} style={{ fontSize:12, padding:"6px 14px",

                                color:"#64748B", cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
                              <button onClick={() => submitComment(t)} disabled={!canSend} style={{
                                fontSize:12, padding:"6px 14px", border:"none", borderRadius:6,
                                fontFamily:"inherit", fontWeight:600,

                                background: canSend ? BRAND : "#E2E8F0",
                                color: canSend ? "white" : "#94A3B8" }}>
                                {panelLoading ? 'Sending...' : 'Send →'}

                      <tr>
                        <td colSpan={3} style={{ padding:"0 16px 12px 44px", background:"#F8FAFC", borderBottom:"1px solid #F1F5F9" }}>

                              <div key={`cc-${ci}`} style={{ marginTop: ci > 0 ? 8 : 0, paddingTop: ci > 0 ? 8 : 0, borderTop: ci > 0 ? "1px solid #F1F5F9" : "none" }}>
                                <span style={{ fontSize:12, color:"#64748B" }}>
                                  💬 <strong style={{ color:"#374151", fontWeight:600 }}>{c.commenter_name}</strong>

                                </span>
                                <div style={{ fontSize:12, color:"#1E293B", marginTop:2, lineHeight:1.5, paddingLeft:18 }}>
                                  {c.body}
                                </div>
                              </div>

                            {/* Asset comments (if applicable) */}
                            {assetComments.map((c, ci) => (
                              <div key={`ac-${ci}`} style={{ marginTop: 8, paddingTop: 8, borderTop:"1px solid #F1F5F9" }}>
                                <span style={{ fontSize:12, color:"#64748B" }}>
                                  💬 <strong style={{ color:"#374151", fontWeight:600 }}>{c.commenter_name}</strong>
                                  , {formatDate(c.created_at)}
                                </span>
                                <div style={{ fontSize:12, color:"#1E293B", marginTop:2, lineHeight:1.5, paddingLeft:18 }}>
                                  {c.body}
                                </div>
                              </div>
                            ))}
                          </div>
                        </td>
                      </tr>
                    )}

                    {/* Asset feedback panel */}
                    {isAssetPanelOpen && (
                      <tr>
                        <td colSpan={3} style={{
                          padding:"0 16px 12px 44px",
                          borderBottom: assetComments.length > 0 ? "none" : "1px solid #F1F5F9",
                          background:"#F8FAFC" }}>
                          <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:8, padding:"14px 16px" }}>
                            <div style={{ fontSize:12, color:"#64748B", marginBottom:12 }}>
                              Feedback on asset: <strong style={{ color:"#374151" }}>"{t.text}"</strong>
                            </div>
                            <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", gap:"8px 12px", alignItems:"center" }}>
                              <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Your name</label>
                              <input value={panelName} onChange={e => setPanelName(e.target.value)}
                                placeholder="e.g. Hayden" style={{ fontSize:13, padding:"6px 10px",
                                border:"1px solid #E2E8F0", borderRadius:6, outline:"none",
                                fontFamily:"inherit", color:"#1E293B" }} />
                              <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Feedback</label>
                              <textarea value={panelBody} onChange={e => setPanelBody(e.target.value)}
                                placeholder="Type your feedback here..." rows={2}
                                style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                                borderRadius:6, outline:"none", fontFamily:"inherit",
                                resize:"vertical", color:"#1E293B" }} />
                            </div>
                            {panelError && <div style={{ fontSize:12, color:"#DC2626", marginTop:8 }}>⚠ {panelError}</div>}
                            <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:10 }}>
                              <button onClick={closePanel} style={{ fontSize:12, padding:"6px 14px",
                                border:"1px solid #E2E8F0", borderRadius:6, background:"white",
                                color:"#64748B", cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
                              <button onClick={() => {
                                setPanelLoading(true); setPanelError('');
                                fetch(`${window.SUPABASE_URL}/rest/v1/comments`, {
                                  method: 'POST',
                                  headers: {
                                    'apikey': window.SUPABASE_ANON_KEY,
                                    'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
                                    'Content-Type': 'application/json',
                                    'Prefer': 'return=representation',
                                  },
                                  body: JSON.stringify({
                                    project_slug: window.PROJECT_SLUG,
                                    item_type: 'task',
                                    item_id: `asset:${t.id}`,
                                    item_text: t.text,
                                    commenter_name: panelName.trim(),
                                    body: panelBody.trim(),
                                  }),
                                })
                                .then(res => { if (!res.ok) throw new Error(`Error ${res.status}`); return res.json(); })
                                .then(([newComment]) => { onCommentAdded(newComment); closePanel(); })
                                .catch(() => { setPanelError('Something went wrong — please try again.'); })
                                .finally(() => setPanelLoading(false));
                              }} disabled={!canSend} style={{
                                fontSize:12, padding:"6px 14px", border:"none", borderRadius:6,
                                fontFamily:"inherit", fontWeight:600,
                                cursor: canSend ? "pointer" : "not-allowed",
                                background: canSend ? BRAND : "#E2E8F0",
                                color: canSend ? "white" : "#94A3B8" }}>
                                {panelLoading ? 'Sending...' : 'Send →'}
                              </button>
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              });
              return rows;
            })()}
          </tbody>
        </table>
        </>
      );
    }

    function App() {
      const [comments, setComments] = useState({});
      const [activeTab, setActiveTab] = useState('overview');
      const [viewedAssets, setViewedAssets] = useState(new Set());

      useEffect(() => {
        const stored = localStorage.getItem('velo_viewed_assets_v1');
        if (stored) setViewedAssets(new Set(JSON.parse(stored)));
      }, []);

      function handleAssetViewed(assetPath) {
        const next = new Set(viewedAssets);
        next.add(assetPath);
        setViewedAssets(next);
        localStorage.setItem('velo_viewed_assets_v1', JSON.stringify([...next]));
      }

      const allTasks = d.disciplines.flatMap(disc => disc.tasks);
      const activeTasks = allTasks.filter(t => t.status !== 'done');
      const doneTasks = allTasks.filter(t => t.status === 'done');

      // Build Supabase comments structure
      const discHasNew = d.disciplines.map(disc => ({
        disc,
        hasComments: disc.tasks.some(t => comments[`task-${t.id}`]?.length > 0 || (t.groupId && comments[`task-group:${t.groupId}`]?.length > 0) || (t.assetPath && comments[`task-asset:${t.id}`]?.length > 0)),
      }));

      return (
        <div style={{ maxWidth:1200, margin:"0 auto", padding:"24px 20px" }}>
          {/* ── Header ── */}
          <div style={{ marginBottom:32 }}>
            <h1 style={{ fontSize:28, fontWeight:700, marginBottom:8, color:"#1E293B" }}>{d.name}</h1>
            <div style={{ display:"flex", alignItems:"center", gap:16, marginBottom:12, flexWrap:"wrap" }}>
              <span style={{ fontSize:14, color:"#64748B" }}>{d.client}</span>
              <span style={{ fontSize:12, color:"#94A3B8" }}>Last updated {d.lastUpdated}</span>
            </div>

            {/* Phase + progress */}
            <div style={{ marginBottom:16 }}>
              <div style={{ fontSize:12, color:"#64748B", marginBottom:6 }}>
                Phase {d.currentPhase + 1}: <strong style={{ color:"#1E293B" }}>{d.phases[d.currentPhase]}</strong>
              </div>
              <ProgressBar done={d.summary.done} total={d.summary.total} color={BRAND} />
            </div>

            {/* Summary counts */}
            <div style={{ display:"flex", gap:20, fontSize:13, flexWrap:"wrap" }}>
              <div><strong style={{ color:BRAND }}>{d.summary.done}</strong> <span style={{ color:"#64748B" }}>Done</span></div>
              <div><strong style={{ color:"#2563EB" }}>{d.summary.inProgress}</strong> <span style={{ color:"#64748B" }}>In Progress</span></div>
              <div><strong style={{ color:"#DC2626" }}>{d.summary.blocked}</strong> <span style={{ color:"#64748B" }}>Blocked</span></div>
              <div><strong style={{ color:"#9CA3AF" }}>{d.summary.todo}</strong> <span style={{ color:"#64748B" }}>To Do</span></div>
            </div>
          </div>

          {/* ── Tab navigation ── */}
          <div style={{ display:"flex", gap:2, borderBottom:"1px solid #E2E8F0", marginBottom:24 }}>
            {["overview", "tasks", "decisions", "weekly-updates", "open-questions"].map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)} style={{
                padding:"12px 16px", fontSize:13, fontWeight:500, color: activeTab === tab ? BRAND : "#64748B",
                background:"none", border:"none", borderBottom: activeTab === tab ? `2px solid ${BRAND}` : "none",
                cursor:"pointer", fontFamily:"inherit", textTransform:"capitalize" }}>
                {tab === "weekly-updates" ? "Weekly Updates" : tab === "open-questions" ? "Open Questions" : tab.charAt(0).toUpperCase() + tab.slice(1)}
              </button>
            ))}
          </div>

          {/* ── Overview Tab ── */}
          {activeTab === 'overview' && (
            <div>
              {discHasNew.map(({ disc }) => (
                <div key={disc.id} style={{ marginBottom:32 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
                    <span style={{ display:"inline-block", width:12, height:12, borderRadius:"50%",
                      background:disc.color, flexShrink:0 }} />
                    <h2 style={{ fontSize:16, fontWeight:600, color:"#1E293B" }}>{disc.label}</h2>
                    <span style={{ fontSize:12, color:"#94A3B8" }}>
                      {disc.tasks.filter(t => t.status === 'done').length}/{disc.tasks.length}
                    </span>
                  </div>
                  <TaskTable
                    tasks={disc.tasks}
                    comments={comments}
                    onCommentAdded={(c) => {
                      const key = c.item_id.startsWith('group:') ? `task-group:${c.item_id.replace('group:', '')}` : `task-${c.item_id}`;
                      setComments(prev => ({ ...prev, [key]: [...(prev[key] || []), c] }));
                    }}
                    viewedAssets={viewedAssets}
                    onAssetViewed={handleAssetViewed}
                    feedbackResponses={d.feedbackResponses}
                  />
                </div>
              ))}
            </div>
          )}

          {/* ── Tasks Tab: Split Active / Done ── */}
          {activeTab === 'tasks' && (
            <div>
              <div style={{ marginBottom:32 }}>
                <h2 style={{ fontSize:16, fontWeight:600, color:"#1E293B", marginBottom:12 }}>
                  Active ({activeTasks.length})
                </h2>
                <TaskTable
                  tasks={activeTasks}
                  comments={comments}
                  onCommentAdded={(c) => {
                    const key = `task-${c.item_id}`;
                    setComments(prev => ({ ...prev, [key]: [...(prev[key] || []), c] }));
                  }}
                  viewedAssets={viewedAssets}
                  onAssetViewed={handleAssetViewed}
                  feedbackResponses={d.feedbackResponses}
                />
              </div>

              <div style={{ marginTop:32 }}>
                <h2 style={{ fontSize:16, fontWeight:600, color:"#1E293B", marginBottom:12 }}>
                  Completed ({doneTasks.length})
                </h2>
                <TaskTable
                  tasks={doneTasks}
                  comments={comments}
                  onCommentAdded={(c) => {
                    const key = `task-${c.item_id}`;
                    setComments(prev => ({ ...prev, [key]: [...(prev[key] || []), c] }));
                  }}
                  viewedAssets={viewedAssets}
                  onAssetViewed={handleAssetViewed}
                  feedbackResponses={d.feedbackResponses}
                />
              </div>
            </div>
          )}

          {/* ── Decisions Tab ── */}
          {activeTab === 'decisions' && (
            <div style={{ display:"grid", gap:16 }}>
              {d.decisions.map((dec, i) => (
                <div key={i} style={{ border:"1px solid #E2E8F0", borderRadius:8, padding:16, background:"white" }}>
                  <div style={{ display:"flex", alignItems:"flex-start", gap:12, marginBottom:8 }}>
                    <span style={{ fontSize:11, color:"#94A3B8", minWidth:100, marginTop:2 }}>{dec.date}</span>
                    <h3 style={{ fontSize:14, fontWeight:600, color:"#1E293B", flex:1 }}>{dec.title}</h3>
                  </div>
                  <p style={{ fontSize:13, color:"#374151", lineHeight:1.6, paddingLeft:112 }}>{dec.detail}</p>
                </div>
              ))}
            </div>
          )}

          {/* ── Weekly Updates Tab ── */}
          {activeTab === 'weekly-updates' && (
            <div>
              {d.weeklyUpdates && d.weeklyUpdates.length > 0 ? (
                <div style={{ display:"grid", gap:16 }}>
                  {d.weeklyUpdates.map((w, i) => (
                    <div key={i} style={{ border:"1px solid #E2E8F0", borderRadius:8, padding:16, background:"white" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>
                        <span style={{ fontSize:12, fontWeight:600, color:BRAND }}>Week {w.week}</span>
                        <span style={{ fontSize:12, color:"#94A3B8" }}>{w.dateRange}</span>
                        <ProgressBar done={w.done} total={w.pct} color={BRAND} />
                      </div>
                      <div style={{ fontSize:13, color:"#374151", lineHeight:1.6 }}>
                        <strong>Wins:</strong> {w.wins?.join(", ") || "—"}<br/>
                        <strong>Next up:</strong> {w.nextUp?.join(", ") || "—"}<br/>
                        {w.blockers && <><strong>Blockers:</strong> {w.blockers}</>}
                      </div>
                      {w.snapshotUrl && (
                        <a href={w.snapshotUrl} target="_blank" style={{ fontSize:12, color:BRAND, textDecoration:"none", marginTop:8, display:"inline-block" }}>
                          View full snapshot →
                        </a>
                      )}
                    </div>
                  ))}
                </div>
              ) : (
                <p style={{ color:"#94A3B8", fontSize:13 }}>No weekly updates yet. They'll appear here every Friday.</p>
              )}
            </div>
          )}

          {/* ── Open Questions Tab ── */}
          {activeTab === 'open-questions' && (
            <div>
              {d.openQuestions && d.openQuestions.length > 0 ? (
                <div style={{ display:"grid", gap:16 }}>
                  {d.openQuestions.map((q, i) => {
                    const u = URGENCY[q.urgency] || URGENCY.medium;
                    return (
                      <div key={i} style={{ border:`1px solid ${u.color}44`, borderLeft:`3px solid ${u.color}`, borderRadius:8, padding:16, background:u.bg }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                          <Badge color={u.color} bg={u.bg}>{u.label}</Badge>
                        </div>
                        <h3 style={{ fontSize:14, fontWeight:600, color:"#1E293B", marginBottom:6 }}>{q.question}</h3>
                        {q.context && <p style={{ fontSize:13, color:"#374151", lineHeight:1.6 }}>{q.context}</p>}
                      </div>
                    );
                  })}
                </div>
              ) : (
                <p style={{ color:"#94A3B8", fontSize:13 }}>No open questions right now.</p>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
