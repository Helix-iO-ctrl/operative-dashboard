        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ flex:1, height:4, background:"#F1F5F9", borderRadius:2, overflow:"hidden" }}>
            <div style={{ width:`${pct}%`, height:"100%", background:color, borderRadius:2, transition:"width .5s ease" }} />
          </div>
          <span style={{ fontSize:11, color:"#94A3B8", minWidth:28, textAlign:"right" }}>{pct}%</span>
        </div>
      );
    }

    function FeedbackResponseBanner({ feedbackKey, feedbackResponses }) {
      const resp = feedbackResponses[feedbackKey];
      if (!resp) return null;
      const fs = FEEDBACK_STATUS[resp.status];
      if (!fs) return null;
      return (
        <div style={{ background: fs.bg, border: `1px solid ${fs.color}22`, borderRadius: 6,
          padding: "8px 12px", marginTop: 8, marginBottom: 4 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
            <span style={{ fontSize: 12 }}>{fs.icon}</span>
            <Badge color={fs.color} bg={fs.bg}>{fs.label}</Badge>
            <span style={{ fontSize: 11, color: "#94A3B8" }}>
              {resp.respondedBy}, {resp.respondedAt}
            </span>
          </div>
          <div style={{ fontSize: 12, color: "#374151", lineHeight: 1.5 }}>{resp.note}</div>
        </div>
      );
    }

    function TaskTable({ tasks, comments = {}, onCommentAdded, viewedAssets = new Set(), onAssetViewed = () => {}, feedbackResponses = {} }) {
      const [hoveredTask, setHoveredTask]   = useState(null);
      const [openPanel, setOpenPanel]       = useState(null);
      const [panelName, setPanelName]       = useState('');
      const [panelBody, setPanelBody]       = useState('');
      const [panelError, setPanelError]     = useState('');
      const [panelLoading, setPanelLoading] = useState(false);
      const [assetModal, setAssetModal]     = useState(null); // assetPath string or null
      const [expandedComments, setExpandedComments] = useState(new Set()); // track which comment sections are expanded

      function toggleCommentSection(key) {
        setExpandedComments(prev => {
          const next = new Set(prev);
          if (next.has(key)) next.delete(key);
          else next.add(key);
          return next;
        });
      }

      function openAsset(assetPath) {
        setAssetModal(assetPath);
        onAssetViewed(assetPath);
      }

      function openComment(taskId) {
        setOpenPanel(taskId);
        setPanelName(''); setPanelBody(''); setPanelError('');
      }
      function closePanel() {
        setOpenPanel(null);
        setPanelName(''); setPanelBody(''); setPanelError('');
      }
      async function submitComment(t) {
        setPanelLoading(true); setPanelError('');
        try {
          const res = await fetch(`${window.SUPABASE_URL}/rest/v1/comments`, {
            method: 'POST',
            headers: {
              'apikey': window.SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
            },
            body: JSON.stringify({
              project_slug: window.PROJECT_SLUG,
              item_type: 'task',
              item_id: String(t.id),
              item_text: t.text,
              commenter_name: panelName.trim(),
              body: panelBody.trim(),
            }),
          });
          if (!res.ok) throw new Error(`Error ${res.status}`);
          const [newComment] = await res.json();
          onCommentAdded(newComment);
          closePanel();
        } catch(e) {
          setPanelError('Something went wrong — please try again.');
          console.error('Comment submit failed:', e);
        } finally {
          setPanelLoading(false);
        }
      }

      const canSend = panelName.trim() && panelBody.trim() && !panelLoading;

      return (
        <>
        {/* ── Asset preview modal ── */}
        {assetModal && (
          <div onClick={() => setAssetModal(null)} style={{
            position:"fixed", inset:0, background:"rgba(15,23,42,0.65)",
            zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center",
            padding:24 }}>
            <div onClick={e => e.stopPropagation()} style={{
              background:"white", borderRadius:14, width:"90vw", height:"86vh",
              maxWidth:1100, display:"flex", flexDirection:"column", overflow:"hidden",
              boxShadow:"0 32px 80px rgba(0,0,0,0.35)" }}>
              {/* Modal header */}
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                padding:"12px 20px", borderBottom:"1px solid #E2E8F0", flexShrink:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ width:8, height:8, borderRadius:"50%", background:BRAND }} />
                  <span style={{ fontSize:13, fontWeight:600, color:"#1E293B" }}>Asset Preview</span>
                  <span style={{ fontSize:11, color:"#94A3B8", fontFamily:"'SF Mono',monospace" }}>
                    {assetModal}
                  </span>
                </div>
                <button onClick={() => setAssetModal(null)} style={{
                  background:"#F1F5F9", border:"none", borderRadius:6,
                  width:28, height:28, fontSize:14, cursor:"pointer",
                  color:"#64748B", display:"flex", alignItems:"center", justifyContent:"center",
                  fontFamily:"inherit", lineHeight:1 }}>✕</button>
              </div>
              {/* iframe — no download controls */}
              <iframe
                src={assetModal}
                title="Asset Preview"
                sandbox="allow-scripts allow-same-origin"
                style={{ flex:1, border:"none", width:"100%", display:"block" }}
              />
            </div>
          </div>
        )}
        <table>
          <thead>
            <tr style={{ background:"#F8FAFC" }}>
              {["Task","Priority","Status"].map(h => (
                <th key={h} style={{ padding:"9px 16px", textAlign:"left", fontSize:11,
                  fontWeight:600, color:"#94A3B8", textTransform:"uppercase",
                  letterSpacing:"0.06em", borderBottom:"1px solid #E2E8F0" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {(() => {
              // Pre-process: collect groups so we can render them as clusters
              const rendered = new Set();
              const rows = [];

              tasks.forEach((t, idx) => {
                if (rendered.has(t.id)) return;

                // ── Grouped tasks: render as a connected cluster ──
                if (t.groupId) {
                  const group = tasks.filter(g => g.groupId === t.groupId);
                  group.forEach(g => rendered.add(g.id));
                  const groupAsset = group.find(g => g.groupAsset)?.groupAsset;
                  const groupLabel = group.find(g => g.groupLabel)?.groupLabel || "Shared deliverable";

                  // Collect all comments for tasks in this group + group-level comments
                  // Group comments stored as item_type='task', item_id='group:<groupId>' to satisfy DB constraint
                  const groupComments = comments[`task-group:${t.groupId}`] || [];
                  const allTaskComments = {};
                  group.forEach(g => { allTaskComments[g.id] = comments[`task-${g.id}`] || []; });
                  const isGroupPanelOpen = openPanel === `group-${t.groupId}`;

                  rows.push(
                    <React.Fragment key={`group-${t.groupId}`}>
                      <tr>
                        <td colSpan={3} style={{ padding:0, borderBottom:"1px solid #F1F5F9" }}>
                          <div style={{ borderLeft:`3px solid ${BRAND}`, margin:"0 12px", padding:"14px 12px" }}>
                            {/* Group label */}
                            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                              <span style={{ fontSize:10, fontWeight:700, color:BRAND,
                                textTransform:"uppercase", letterSpacing:"0.08em" }}>
                                {groupLabel}
                              </span>
                              <span style={{ fontSize:10, color:"#94A3B8" }}>
                                {group.length} tasks delivered together
                              </span>
                            </div>

                            {/* Stacked task items — each with hover note */}
                            {group.map((g, gi) => {
                              const gs = STATUS[g.status]; const gp = PRIORITY[g.priority];
                              const taskNotes = allTaskComments[g.id] || [];
                              const isTaskPanelOpen = openPanel === g.id;
                              return (
                                <div key={g.id}>
                                  <div
                                    onMouseEnter={() => setHoveredTask(g.id)}
                                    onMouseLeave={() => setHoveredTask(null)}
                                    style={{
                                      display:"flex", alignItems:"center", justifyContent:"space-between",
                                      padding:"6px 0",
                                      borderTop: gi > 0 ? "1px solid #F1F5F9" : "none",
                                      background: hoveredTask === g.id ? "#FAFBFF" : "transparent",
                                      borderRadius:4, margin:"0 -4px", padding:"6px 4px" }}>
                                    <div style={{ display:"flex", alignItems:"center", gap:8, flex:1 }}>
                                      <span style={{ display:"inline-block", width:7, height:7, borderRadius:"50%",
                                        background:gs.dot, flexShrink:0 }} />
                                      <span style={{ fontSize:13,
                                        color: g.status==="done" ? "#94A3B8" : "#1E293B",
                                        textDecoration: g.status==="done" ? "line-through" : "none",
                                        lineHeight:1.5 }}>
                                        {g.text}
                                      </span>
                                    </div>
                                    <div style={{ display:"flex", gap:6, flexShrink:0, marginLeft:12, alignItems:"center" }}>
                                      {hoveredTask === g.id && !isTaskPanelOpen && (
                                        <button onClick={() => openComment(g.id)} style={{
                                          background:"none", border:"1px solid #E2E8F0", borderRadius:4,
                                          padding:"2px 8px", fontSize:11, color:"#64748B", cursor:"pointer",
                                          display:"flex", alignItems:"center", gap:4, whiteSpace:"nowrap",
                                          fontFamily:"inherit" }}>
                                          💬 Note
                                        </button>
                                      )}
                                      <Badge color={gp.color} bg={gp.bg}>{gp.label}</Badge>
                                      <Badge color={gs.badgeText} bg={gs.badge}>{gs.label}</Badge>
                                    </div>
                                  </div>

                                  {/* Per-task inline comment panel */}
                                  {isTaskPanelOpen && (
                                    <div style={{ padding:"8px 0 8px 15px" }}>
                                      <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:8, padding:"12px 14px" }}>
                                        <div style={{ fontSize:12, color:"#64748B", marginBottom:10 }}>
                                          Note on: <strong style={{ color:"#374151" }}>"{g.text}"</strong>
                                        </div>
                                        <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", gap:"8px 12px", alignItems:"center" }}>
                                          <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Your name</label>
                                          <input value={panelName} onChange={e => setPanelName(e.target.value)}
                                            placeholder="e.g. Hayden" style={{ fontSize:13, padding:"6px 10px",
                                            border:"1px solid #E2E8F0", borderRadius:6, outline:"none",
                                            fontFamily:"inherit", color:"#1E293B" }} />
                                          <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Note</label>
                                          <textarea value={panelBody} onChange={e => setPanelBody(e.target.value)}
                                            placeholder="Type your note here..." rows={2}
                                            style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                                            borderRadius:6, outline:"none", fontFamily:"inherit",
                                            resize:"vertical", color:"#1E293B" }} />
                                        </div>
                                        {panelError && <div style={{ fontSize:12, color:"#DC2626", marginTop:8 }}>⚠ {panelError}</div>}
                                        <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:10 }}>
                                          <button onClick={closePanel} style={{ fontSize:12, padding:"6px 14px",
                                            border:"1px solid #E2E8F0", borderRadius:6, background:"white",
                                            color:"#64748B", cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
                                          <button onClick={() => submitComment(g)} disabled={!canSend} style={{
                                            fontSize:12, padding:"6px 14px", border:"none", borderRadius:6,
                                            fontFamily:"inherit", fontWeight:600,
                                            cursor: canSend ? "pointer" : "not-allowed",
                                            background: canSend ? BRAND : "#E2E8F0",
                                            color: canSend ? "white" : "#94A3B8" }}>
                                            {panelLoading ? 'Sending...' : 'Send →'}
                                          </button>
                                        </div>
                                      </div>
                                    </div>
                                  )}

                                  {/* Per-task existing comments — only shown when task comments expanded */}
                                  {expandedComments.has(`task-${g.id}`) && taskNotes.map((c, ci) => (
                                    <div key={`tc-${ci}`} style={{ padding:"2px 0 2px 15px" }}>
                                      <span style={{ fontSize:12, color:"#64748B" }}>
                                        💬 <strong style={{ color:"#374151", fontWeight:600 }}>{c.commenter_name}</strong>
                                        , {formatDate(c.created_at)} · "{c.body}"
                                      </span>
                                    </div>
                                  ))}
                                </div>
                              );
                            })}

                            {/* Shared asset + group-level note — one for the whole group */}
                            {(() => {
                              const groupFeedbackKey = `task-group:${t.groupId}`;
                              const totalGroupComments = groupComments.length + group.reduce((sum, g) => sum + (allTaskComments[g.id] || []).length, 0);
                              const groupResp = feedbackResponses[groupFeedbackKey];
                              const groupFs = groupResp ? FEEDBACK_STATUS[groupResp.status] : null;
                              const isGroupExpanded = expandedComments.has(groupFeedbackKey);

                              return (
                                <>
                                <div style={{ marginTop:10, paddingTop:10, borderTop:"1px solid #F1F5F9",
                                  display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                                  {groupAsset && (
                                    <button onClick={() => openAsset(groupAsset)} style={{
                                      background:"none", border:`1px solid ${BRAND}`,
                                      borderRadius:5, padding:"4px 12px", fontSize:11, color:BRAND,
                                      cursor:"pointer", fontFamily:"inherit",
                                      display:"inline-flex", alignItems:"center", gap:6,
                                      textDecoration:"none" }}>
                                      {!viewedAssets.has(groupAsset) && (
                                        <span style={{ background:BRAND, color:"white", fontSize:9,
                                          fontWeight:700, borderRadius:3, padding:"1px 5px",
                                          letterSpacing:"0.06em", textTransform:"uppercase" }}>NEW</span>
                                      )}
                                      View asset →
                                    </button>
                                  )}
                                  {!isGroupPanelOpen && (
                                    <button onClick={() => openComment(`group-${t.groupId}`)} style={{
                                      background:"none", border:"1px solid #E2E8F0", borderRadius:5,
                                      padding:"4px 12px", fontSize:11, color:"#64748B", cursor:"pointer",
                                      display:"inline-flex", alignItems:"center", gap:5,
                                      fontFamily:"inherit" }}>
                                      💬 Note on deliverable
                                    </button>
                                  )}
                                  {/* Collapsible feedback toggle */}
                                  {totalGroupComments > 0 && (
                                    <button onClick={() => toggleCommentSection(groupFeedbackKey)} style={{
                                      background: isGroupExpanded ? "#F1F5F9" : "none",
                                      border:"1px solid #E2E8F0", borderRadius:5,
                                      padding:"4px 12px", fontSize:11, color:"#64748B", cursor:"pointer",
                                      display:"inline-flex", alignItems:"center", gap:5,
                                      fontFamily:"inherit" }}>
                                      {isGroupExpanded ? "▾" : "▸"} {totalGroupComments} comment{totalGroupComments !== 1 ? "s" : ""}
                                      {groupFs && (
                                        <span style={{ fontSize:10, fontWeight:600, color: groupFs.color,
                                          background: groupFs.bg, padding:"1px 6px", borderRadius:3, marginLeft:4 }}>
                                          {groupFs.icon} {groupFs.label}
                                        </span>
                                      )}
                                    </button>
                                  )}
                                  {/* Show status badge even if no toggle needed */}
                                  {totalGroupComments === 0 && groupFs && (
                                    <span style={{ fontSize:10, fontWeight:600, color: groupFs.color,
                                      background: groupFs.bg, padding:"2px 8px", borderRadius:4,
                                      display:"inline-flex", alignItems:"center", gap:4 }}>
                                      {groupFs.icon} {groupFs.label}
                                    </span>
                                  )}
                                </div>

                                {/* Expanded comments section */}
                                {isGroupExpanded && (
                                  <div style={{ marginTop:8, padding:"10px 12px", background:"#FAFBFF",
                                    borderRadius:8, border:"1px solid #E2E8F0" }}>
                                    {/* Feedback response banner */}
                                    <FeedbackResponseBanner feedbackKey={groupFeedbackKey} feedbackResponses={feedbackResponses} />

                                    {/* Group-level comments */}
                                    {groupComments.map((c, ci) => (
                                      <div key={`gc-${ci}`} style={{ marginTop: 6, padding:"6px 0",
                                        borderTop: ci > 0 ? "1px solid #F1F5F9" : "none" }}>
                                        <span style={{ fontSize:12, color:"#64748B" }}>
                                          💬 <strong style={{ color:"#374151", fontWeight:600 }}>{c.commenter_name}</strong>
                                          , {formatDate(c.created_at)}
                                        </span>
                                        <div style={{ fontSize:12, color:"#1E293B", marginTop:2, lineHeight:1.5, paddingLeft:18 }}>
                                          {c.body}
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                )}
                                </>
                              );
                            })()}

                            {/* Group-level comment panel */}
                            {isGroupPanelOpen && (
                              <div style={{ marginTop:10 }}>
                                <div style={{ background:"white", border:"1px solid #E2E8F0", borderRadius:8, padding:"12px 14px" }}>
                                  <div style={{ fontSize:12, color:"#64748B", marginBottom:10 }}>
                                    Note on deliverable: <strong style={{ color:"#374151" }}>"{groupLabel}"</strong>
                                  </div>
                                  <div style={{ display:"grid", gridTemplateColumns:"80px 1fr", gap:"8px 12px", alignItems:"center" }}>
                                    <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Your name</label>
                                    <input value={panelName} onChange={e => setPanelName(e.target.value)}
                                      placeholder="e.g. Hayden" style={{ fontSize:13, padding:"6px 10px",
                                      border:"1px solid #E2E8F0", borderRadius:6, outline:"none",
                                      fontFamily:"inherit", color:"#1E293B" }} />
                                    <label style={{ fontSize:12, color:"#64748B", textAlign:"right" }}>Note</label>
                                    <textarea value={panelBody} onChange={e => setPanelBody(e.target.value)}
                                      placeholder="Overall feedback on this deliverable..." rows={2}
                                      style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                                      borderRadius:6, outline:"none", fontFamily:"inherit",
                                      resize:"vertical", color:"#1E293B" }} />
                                  </div>
                                  {panelError && <div style={{ fontSize:12, color:"#DC2626", marginTop:8 }}>⚠ {panelError}</div>}
                                  <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:10 }}>
                                    <button onClick={closePanel} style={{ fontSize:12, padding:"6px 14px",
                                      border:"1px solid #E2E8F0", borderRadius:6, background:"white",
                                      color:"#64748B", cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
                                    <button onClick={() => {
                                      setPanelLoading(true); setPanelError('');
                                      fetch(`${window.SUPABASE_URL}/rest/v1/comments`, {
                                        method: 'POST',
                                        headers: {
                                          'apikey': window.SUPABASE_ANON_KEY,
                                          'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
                                          'Content-Type': 'application/json',
                                          'Prefer': 'return=representation',
                                        },
                                        body: JSON.stringify({
                                          project_slug: window.PROJECT_SLUG,
                                          item_type: 'task',
                                          item_id: `group:${t.groupId}`,
                                          item_text: groupLabel,
                                          commenter_name: panelName.trim(),
                                          body: panelBody.trim(),
                                        }),
                                      })
                                      .then(res => { if (!res.ok) throw new Error(`Error ${res.status}`); return res.json(); })
                                      .then(([newComment]) => { onCommentAdded(newComment); closePanel(); })
                                      .catch(() => { setPanelError('Something went wrong — please try again.'); })
                                      .finally(() => setPanelLoading(false));
                                    }} disabled={!canSend} style={{
                                      fontSize:12, padding:"6px 14px", border:"none", borderRadius:6,
                                      fontFamily:"inherit", fontWeight:600,
                                      cursor: canSend ? "pointer" : "not-allowed",
                                      background: canSend ? BRAND : "#E2E8F0",
                                      color: canSend ? "white" : "#94A3B8" }}>
                                      {panelLoading ? 'Sending...' : 'Send →'}
                                    </button>
                                  </div>
                                </div>
                              </div>
                            )}
                          </div>
                        </td>
                      </tr>
                    </React.Fragment>
                  );
                  return;
                }

                // ── Regular (ungrouped) task ──
                rendered.add(t.id);
                const s = STATUS[t.status]; const p = PRIORITY[t.priority];
                const taskComments  = comments[`task-${t.id}`] || [];
                const assetKey = t.assetPath ? `task-asset:${t.id}` : null;
                const assetComments = assetKey ? (comments[assetKey] || []) : [];
                const isPanelOpen   = openPanel === t.id;
                const isAssetPanelOpen = openPanel === `asset-${t.id}`;
                const totalCommentCount = taskComments.length + assetComments.length;
                const commentSectionKey = assetKey || `task-${t.id}`;
                const isCommentsExpanded = expandedComments.has(commentSectionKey);
                const assetResp = assetKey ? feedbackResponses[assetKey] : null;
                const assetFs = assetResp ? FEEDBACK_STATUS[assetResp.status] : null;
                const hasBelowContent = isCommentsExpanded || isPanelOpen || isAssetPanelOpen;

                rows.push(
                  <React.Fragment key={t.id}>
                    <tr
                      onMouseEnter={() => setHoveredTask(t.id)}
                      onMouseLeave={() => setHoveredTask(null)}
                      style={{ background: hoveredTask === t.id ? '#FAFBFF' : 'white' }}
                    >
                      <td style={{ padding:"11px 16px", borderBottom: hasBelowContent ? "none" : "1px solid #F1F5F9" }}>
                        <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
                          <div style={{ display:"flex", alignItems:"flex-start", gap:9, flex:1 }}>
                            <span style={{ display:"inline-block", width:7, height:7, borderRadius:"50%",
                              background:s.dot, marginTop:4, flexShrink:0 }} />
                            <div>
                              <div style={{ fontSize:13, color:t.status==="done"?"#94A3B8":"#1E293B",
                                textDecoration:t.status==="done"?"line-through":"none", lineHeight:1.5 }}>
                                {t.text}
                              </div>
                              {t.assetPath && (
                                <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:5, flexWrap:"wrap" }}>
                                  <button onClick={() => openAsset(t.assetPath)} style={{
                                    background:"none", border:`1px solid ${BRAND}`,
                                    borderRadius:5, padding:"2px 9px", fontSize:11, color:BRAND,
                                    cursor:"pointer", fontFamily:"inherit",
                                    display:"inline-flex", alignItems:"center", gap:5,
                                    textDecoration:"none" }}>
                                    {!viewedAssets.has(t.assetPath) && (
                                      <span style={{ background:BRAND, color:"white", fontSize:9,
                                        fontWeight:700, borderRadius:3, padding:"1px 5px",
                                        letterSpacing:"0.06em", textTransform:"uppercase" }}>NEW</span>
                                    )}
                                    View asset →
                                  </button>
                                  {!isAssetPanelOpen && (
                                    <button onClick={() => openComment(`asset-${t.id}`)} style={{
                                      background:"none", border:"1px solid #E2E8F0", borderRadius:5,
                                      padding:"2px 9px", fontSize:11, color:"#64748B", cursor:"pointer",
                                      display:"inline-flex", alignItems:"center", gap:5,
                                      fontFamily:"inherit" }}>
                                      💬 Feedback
                                    </button>
                                  )}
                                  {/* Collapsible feedback toggle */}
                                  {totalCommentCount > 0 && (
                                    <button onClick={() => toggleCommentSection(commentSectionKey)} style={{
                                      background: isCommentsExpanded ? "#F1F5F9" : "none",
                                      border:"1px solid #E2E8F0", borderRadius:5,
                                      padding:"2px 9px", fontSize:11, color:"#64748B", cursor:"pointer",
                                      display:"inline-flex", alignItems:"center", gap:5,
                                      fontFamily:"inherit" }}>
                                      {isCommentsExpanded ? "▾" : "▸"} {totalCommentCount} comment{totalCommentCount !== 1 ? "s" : ""}
                                      {assetFs && (
                                        <span style={{ fontSize:10, fontWeight:600, color: assetFs.color,
                                          background: assetFs.bg, padding:"1px 6px", borderRadius:3, marginLeft:2 }}>
                                          {assetFs.icon} {assetFs.label}
                                        </span>
                                      )}
                                    </button>
                                  )}
                                  {totalCommentCount === 0 && assetFs && (
                                    <span style={{ fontSize:10, fontWeight:600, color: assetFs.color,
                                      background: assetFs.bg, padding:"2px 8px", borderRadius:4,
                                      display:"inline-flex", alignItems:"center", gap:4 }}>
                                      {assetFs.icon} {assetFs.label}
                                    </span>

    const REACTIONS = [
      { key:'agree',    emoji:'👍', label:'Agreed',   defaultBody:'Agreed'   },
      { key:'question', emoji:'❓', label:'Question',  defaultBody:'Question' },
      { key:'concern',  emoji:'⚠️', label:'Concern',  defaultBody:'Concern'  },
    ];

    function DecisionRow({ dec, index, comments, onCommentAdded }) {
      const [selected, setSelected] = useState(null);
      const [name, setName]         = useState('');
      const [note, setNote]         = useState('');
      const [error, setError]       = useState('');
      const [loading, setLoading]   = useState(false);

      const decComments = comments[`decision-${index}`] || [];
      const counts = { agree:0, question:0, concern:0 };
      decComments.forEach(c => { if (c.reaction) counts[c.reaction]++; });
      const notes = decComments.filter(c => !REACTIONS.map(r=>r.defaultBody).includes(c.body));

      function pickReaction(key) {
        setSelected(key === selected ? null : key);
        setName(''); setNote(''); setError('');
      }

      async function submitReaction() {
        setLoading(true); setError('');
        const r = REACTIONS.find(r => r.key === selected);
        try {
          const res = await fetch(`${window.SUPABASE_URL}/rest/v1/comments`, {
            method: 'POST',
            headers: {
              'apikey': window.SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation',
            },
            body: JSON.stringify({
              project_slug: window.PROJECT_SLUG,
              item_type: 'decision',
              item_id: String(index),
              item_text: dec.title,
              commenter_name: name.trim(),
              body: note.trim() || r.defaultBody,
              reaction: selected,
            }),
          });
          if (!res.ok) throw new Error(`Error ${res.status}`);
          const [newComment] = await res.json();
          onCommentAdded(newComment);
          setSelected(null); setName(''); setNote('');
        } catch(e) {
          setError('Something went wrong — please try again.');
          console.error('Reaction submit failed:', e);
        } finally {
          setLoading(false);
        }
      }

      const canConfirm = name.trim() && !loading;

      return (
        <div style={{ borderBottom:"1px solid #F1F5F9" }}>
          <div style={{ display:"grid", gridTemplateColumns:"130px 1fr", padding:"16px 18px", gap:16 }}>
            <span style={{ fontSize:12, color:"#94A3B8", paddingTop:1 }}>{dec.date}</span>
            <div>
              <div style={{ fontSize:13, fontWeight:600, color:"#0F172A", marginBottom:4 }}>{dec.title}</div>
              <div style={{ fontSize:12, color:"#64748B", lineHeight:1.6, marginBottom:12 }}>{dec.detail}</div>

              {/* Notes from reactions that included custom text */}
              {notes.map((c, ci) => (
                <div key={ci} style={{ fontSize:12, color:"#64748B", marginBottom:6 }}>
                  {REACTIONS.find(r=>r.key===c.reaction)?.emoji || '💬'}{' '}
                  <strong style={{ color:"#374151" }}>{c.commenter_name}</strong>
                  , {formatDate(c.created_at)} · "{c.body}"
                </div>
              ))}

              {/* Reaction buttons */}
              <div style={{ display:"flex", gap:8, marginTop: notes.length ? 10 : 0 }}>
                {REACTIONS.map(r => {
                  const isActive = selected === r.key;
                  return (
                    <button key={r.key} onClick={() => pickReaction(r.key)} style={{
                      fontSize:12, padding:"5px 12px", borderRadius:6, fontFamily:"inherit",
                      border: isActive ? `1px solid ${BRAND}` : '1px solid #E2E8F0',
                      background: isActive ? '#ECFDF5' : 'white',
                      color: isActive ? BRAND : '#374151',
                      fontWeight: isActive ? 600 : 400,
                      cursor:"pointer", transition:"all .1s" }}>
                      {r.emoji} {r.label}{counts[r.key] > 0 ? ` (${counts[r.key]})` : ''}
                    </button>
                  );
                })}
              </div>

              {/* Confirm form — appears when a reaction is selected */}
              {selected && (
                <div style={{ marginTop:10, padding:"12px 14px", background:"#F8FAFC",
                  borderRadius:8, border:"1px solid #E2E8F0" }}>
                  <div style={{ fontSize:12, color:"#64748B", marginBottom:8 }}>
                    {REACTIONS.find(r=>r.key===selected).emoji} {REACTIONS.find(r=>r.key===selected).label} — confirm your name and add an optional note
                  </div>
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                    <input
                      value={name}
                      onChange={e => setName(e.target.value)}
                      placeholder="Your name"
                      style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                        borderRadius:6, outline:"none", fontFamily:"inherit", color:"#1E293B", width:160 }}
                    />
                    <input
                      value={note}
                      onChange={e => setNote(e.target.value)}
                      placeholder="Add a note (optional)"
                      style={{ fontSize:13, padding:"6px 10px", border:"1px solid #E2E8F0",
                        borderRadius:6, outline:"none", fontFamily:"inherit", color:"#1E293B", flex:1, minWidth:160 }}
                    />
                  </div>
                  {error && <div style={{ fontSize:12, color:"#DC2626", marginTop:6 }}>⚠ {error}</div>}
                  <div style={{ display:"flex", gap:8, marginTop:8 }}>
                    <button onClick={() => { setSelected(null); setName(''); setNote(''); }} style={{
                      fontSize:12, padding:"5px 12px", border:"1px solid #E2E8F0",
                      borderRadius:6, background:"white", color:"#64748B", cursor:"pointer", fontFamily:"inherit" }}>
                      Cancel
                    </button>
                    <button onClick={submitReaction} disabled={!canConfirm} style={{
                      fontSize:12, padding:"5px 12px", border:"none", borderRadius:6,
                      fontFamily:"inherit", fontWeight:600,
                      cursor: canConfirm ? "pointer" : "not-allowed",
                      background: canConfirm ? BRAND : "#E2E8F0",
                      color: canConfirm ? "white" : "#94A3B8" }}>
                      {loading ? 'Submitting...' : 'Confirm →'}
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

                <button onClick={submitAnswer} disabled={!canSubmit} style={{

    function ProgressModal({ pct, done, total, onClose }) {
      // Generate DNA helix path data
      const helixHeight = 320;
      const helixWidth = 120;
      const rungs = 16;
      const amplitude = 40;
      const cx = helixWidth / 2;
      const filledRungs = Math.round((pct / 100) * rungs);

      // Build two sine wave strands
      const strand1Points = [];
      const strand2Points = [];
      for (let i = 0; i <= rungs * 4; i++) {
        const t = i / (rungs * 4);
        const y = t * helixHeight;
        const x1 = cx + Math.sin(t * Math.PI * 2 * (rungs / 4)) * amplitude;
        const x2 = cx - Math.sin(t * Math.PI * 2 * (rungs / 4)) * amplitude;
        strand1Points.push(`${x1},${y}`);
        strand2Points.push(`${x2},${y}`);
      }

      return (
        <div onClick={onClose} style={{
          position:"fixed", inset:0, background:"rgba(15,23,42,0.75)",
          zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center",
          padding:32 }}>
          <div onClick={e => e.stopPropagation()} style={{
            background:"linear-gradient(135deg, #0F172A 0%, #1E293B 100%)",
            borderRadius:20, width:420, overflow:"hidden",
            boxShadow:"0 32px 80px rgba(0,0,0,0.5)",
            display:"flex", flexDirection:"column", alignItems:"center",
            padding:"40px 32px 32px" }}>

            {/* Close */}
            <button onClick={onClose} style={{
              position:"absolute", top:16, right:16,
              background:"rgba(255,255,255,0.1)", border:"none", borderRadius:6,
              width:28, height:28, fontSize:14, cursor:"pointer",
              color:"#94A3B8", display:"flex", alignItems:"center", justifyContent:"center",
              fontFamily:"inherit" }}>✕</button>

            {/* Title */}
            <div style={{ fontSize:10, fontWeight:700, color: BRAND, textTransform:"uppercase",
              letterSpacing:"0.15em", marginBottom:4 }}>Project Progress</div>
            <div style={{ fontSize:32, fontWeight:800, color:"white", marginBottom:2 }}>
              {pct}%
            </div>
            <div style={{ fontSize:12, color:"#94A3B8", marginBottom:28 }}>
              {done} of {total} tasks complete
            </div>

            {/* DNA Helix visualization */}
            <div style={{ position:"relative", width:helixWidth + 40, height:helixHeight + 20 }}>
              <svg width={helixWidth + 40} height={helixHeight + 20} viewBox={`-20 -10 ${helixWidth+40} ${helixHeight+20}`}>
                {/* Glow filter */}
                <defs>
                  <filter id="glow">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
                  </filter>
                  <linearGradient id="helixGrad" x1="0" y1="1" x2="0" y2="0">
                    <stop offset="0%" stopColor="#2563EB" />
                    <stop offset={`${pct}%`} stopColor="#2563EB" />
                    <stop offset={`${pct}%`} stopColor="#334155" />
                    <stop offset="100%" stopColor="#334155" />
                  </linearGradient>
                  <linearGradient id="helixGradAlt" x1="0" y1="1" x2="0" y2="0">
                    <stop offset="0%" stopColor="#7C3AED" />
                    <stop offset={`${pct}%`} stopColor="#7C3AED" />
                    <stop offset={`${pct}%`} stopColor="#334155" />
                    <stop offset="100%" stopColor="#334155" />
                  </linearGradient>
                </defs>

                {/* Rungs (horizontal connectors) */}
                {Array.from({ length: rungs }, (_, i) => {
                  const t = (i + 0.5) / rungs;
                  const y = t * helixHeight;
                  const x1 = cx + Math.sin(t * Math.PI * 2 * (rungs / 4)) * amplitude;
                  const x2 = cx - Math.sin(t * Math.PI * 2 * (rungs / 4)) * amplitude;
                  const filled = i < filledRungs;
                  return (
                    <line key={`rung-${i}`}
                      x1={x1} y1={y} x2={x2} y2={y}
                      stroke={filled ? "rgba(37,99,235,0.3)" : "rgba(51,65,85,0.2)"}
                      strokeWidth={2}
                      strokeDasharray={filled ? "none" : "3,3"} />
                  );
                })}

                {/* Strand 1 */}
                <polyline
                  points={strand1Points.join(' ')}
                  fill="none"
                  stroke="url(#helixGrad)"
                  strokeWidth={3}
                  strokeLinecap="round"
                  strokeLinejoin="round"
                  filter={pct > 0 ? "url(#glow)" : "none"} />

                {/* Strand 2 */}
                <polyline
                  points={strand2Points.join(' ')}
                  fill="none"
                  stroke="url(#helixGradAlt)"
                  strokeWidth={3}
                  strokeLinecap="round"
                  strokeLinejoin="round"
                  filter={pct > 0 ? "url(#glow)" : "none"} />

                {/* Node dots at rung intersections */}
                {Array.from({ length: rungs }, (_, i) => {
                  const t = (i + 0.5) / rungs;
                  const y = t * helixHeight;
                  const x1 = cx + Math.sin(t * Math.PI * 2 * (rungs / 4)) * amplitude;
                  const x2 = cx - Math.sin(t * Math.PI * 2 * (rungs / 4)) * amplitude;
                  const filled = i < filledRungs;
                  return (
                    <React.Fragment key={`nodes-${i}`}>
                      <circle cx={x1} cy={y} r={filled ? 4 : 3}
                        fill={filled ? "#2563EB" : "#334155"}
                        stroke={filled ? "#2563EB" : "none"} strokeWidth={1}
                        filter={filled ? "url(#glow)" : "none"} />
                      <circle cx={x2} cy={y} r={filled ? 4 : 3}
                        fill={filled ? "#7C3AED" : "#334155"}
                        stroke={filled ? "#7C3AED" : "none"} strokeWidth={1}
                        filter={filled ? "url(#glow)" : "none"} />
                    </React.Fragment>
                  );
                })}

                {/* Fill level line */}
                {pct > 0 && pct < 100 && (
                  <line
                    x1={-10} y1={helixHeight * (1 - pct/100)}
                    x2={helixWidth + 10} y2={helixHeight * (1 - pct/100)}
                    stroke={BRAND} strokeWidth={1} strokeDasharray="4,4" opacity={0.5} />
                )}
              </svg>
            </div>

            {/* Phase info */}
            <div style={{ display:"flex", gap:12, marginTop:20, width:"100%" }}>
              {d.phases.map((p, i) => (
                <div key={p} style={{ flex:1, textAlign:"center" }}>
                  <div style={{ height:3, borderRadius:2, marginBottom:6,
                    background: i <= d.currentPhase ? (i < d.currentPhase ? "rgba(37,99,235,0.3)" : BRAND) : "#334155" }} />
                  <div style={{ fontSize:10, color: i === d.currentPhase ? "white" : "#64748B",
                    fontWeight: i === d.currentPhase ? 600 : 400 }}>{p}</div>
                </div>
              ))}
            </div>

            {/* Discipline breakdown */}
            <div style={{ marginTop:20, width:"100%", padding:"14px 0", borderTop:"1px solid #334155" }}>
              {d.disciplines.map(disc => {
                const dDone = disc.tasks.filter(t => t.status === "done").length;
                const dTotal = disc.tasks.length;
                const dPct = dTotal > 0 ? Math.round((dDone / dTotal) * 100) : 0;
                return (
                  <div key={disc.id} style={{ display:"flex", alignItems:"center", gap:10,
                    padding:"4px 0" }}>
                    <div style={{ width:18, height:18, borderRadius:4,
                      background: disc.color + "22", border:`1px solid ${disc.color}44`,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:9, fontWeight:700, color: disc.color, flexShrink:0 }}>
                      {disc.label[0]}
                    </div>
                    <span style={{ fontSize:11, color:"#94A3B8", width:72, flexShrink:0 }}>{disc.label}</span>
                    <div style={{ flex:1, height:4, background:"#1E293B", borderRadius:2, overflow:"hidden" }}>
                      <div style={{ width:`${dPct}%`, height:"100%", background: disc.color,
                        borderRadius:2, transition:"width .5s ease" }} />
                    </div>
                    <span style={{ fontSize:10, fontWeight:600, color: disc.color, width:32,
                      textAlign:"right", flexShrink:0 }}>{dPct}%</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function PreviewModal({ url, title, onClose }) {
      if (!url) return null;
      return (
        <div onClick={onClose} style={{
          position:"fixed", inset:0, background:"rgba(15,23,42,0.6)",
          zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center",
          padding:32 }}>
          <div onClick={e => e.stopPropagation()} style={{
            background:"white", borderRadius:14, width:"88vw", height:"82vh",
            maxWidth:1060, display:"flex", flexDirection:"column", overflow:"hidden",
            boxShadow:"0 32px 80px rgba(0,0,0,0.3)" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
              padding:"10px 18px", borderBottom:"1px solid #E2E8F0", flexShrink:0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:7, height:7, borderRadius:"50%", background:BRAND }} />
                <span style={{ fontSize:13, fontWeight:600, color:"#1E293B" }}>{title || "Preview"}</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <a href={url} target="_blank" rel="noreferrer" style={{
                  fontSize:11, color:BRAND, textDecoration:"none", fontWeight:500,
                  padding:"4px 10px", border:`1px solid ${BRAND}`, borderRadius:5,
                  display:"inline-flex", alignItems:"center", gap:4 }}>
                  Open in new tab ↗
                </a>
                <button onClick={onClose} style={{
                  background:"#F1F5F9", border:"none", borderRadius:6,
                  width:28, height:28, fontSize:14, cursor:"pointer",
                  color:"#64748B", display:"flex", alignItems:"center", justifyContent:"center",
                  fontFamily:"inherit", lineHeight:1 }}>✕</button>
              </div>
            </div>
            <iframe
              src={url}
